  <style>
:root {
  --bg: #f6f4fb;
  --surface: #ffffff;
  --surface-2: #f0edf8;
  --text: #211d2e;
  --muted: #716b80;
  --line: #e4e0ec;
  --primary: #6f5be7;
  --primary-soft: #ebe7ff;
  --accent: #ef7da8;
  --green: #2f9b72;
  --green-soft: #e4f5ee;
  --amber: #b97716;
  --amber-soft: #fff1d7;
  --red: #bd4d5b;
  --red-soft: #ffe9ec;
  --shadow: 0 14px 40px rgba(54, 44, 90, 0.10);
  --radius: 20px;
  --safe-bottom: max(12px, env(safe-area-inset-bottom));
}

* { box-sizing: border-box; }
html { background: var(--bg); }
body {
  margin: 0;
  color: var(--text);
  background:
    radial-gradient(circle at 100% 0%, rgba(111,91,231,.12), transparent 28%),
    var(--bg);
  font-family: Inter, ui-rounded, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font: inherit; }
button { -webkit-tap-highlight-color: transparent; }

.app-shell { min-height: 100dvh; padding-bottom: 94px; }
.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: max(18px, env(safe-area-inset-top)) 18px 12px;
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter: blur(18px);
}
.topbar h1 { margin: 1px 0 0; font-size: 28px; letter-spacing: -.04em; }
.eyebrow { margin: 0; color: var(--muted); font-size: 12px; font-weight: 750; text-transform: uppercase; letter-spacing: .09em; }
.main-content { width: min(100%, 940px); margin: 0 auto; padding: 6px 16px 24px; }

.bottom-nav {
  position: fixed;
  z-index: 30;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  width: min(100%, 760px);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  padding: 9px 8px var(--safe-bottom);
  border-top: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
  background: color-mix(in srgb, white 92%, transparent);
  backdrop-filter: blur(22px);
}
.nav-item {
  border: 0;
  background: transparent;
  color: var(--muted);
  min-height: 55px;
  border-radius: 15px;
  display: grid;
  place-content: center;
  gap: 3px;
  cursor: pointer;
}
.nav-item span { font-size: 21px; line-height: 1; }
.nav-item small { font-size: 11px; font-weight: 700; }
.nav-item.active { color: var(--primary); background: var(--primary-soft); }

.icon-button {
  border: 0;
  width: 42px;
  height: 42px;
  border-radius: 14px;
  color: white;
  background: var(--primary);
  font-size: 26px;
  line-height: 1;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(111,91,231,.23);
}
.icon-button.secondary { background: var(--surface-2); color: var(--text); box-shadow: none; }

.card {
  background: var(--surface);
  border: 1px solid rgba(226, 222, 236, .9);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
}
.card + .card { margin-top: 12px; }
.card h2, .card h3, .card p { margin-top: 0; }
.card-title-row, .section-title-row, .week-toolbar, .row-between {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.section { margin-top: 18px; }
.section-title-row { margin: 0 2px 9px; }
.section-title-row h2 { margin: 0; font-size: 18px; }
.muted { color: var(--muted); }
.small { font-size: 13px; }
.tiny { font-size: 11px; }

.hero {
  background: linear-gradient(135deg, #2d2745 0%, #6452d2 75%, #8d75ef 100%);
  color: white;
  overflow: hidden;
  position: relative;
}
.hero::after {
  content: "";
  position: absolute;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  right: -65px;
  top: -90px;
  background: rgba(255,255,255,.10);
}
.hero .muted { color: rgba(255,255,255,.72); }
.hero h2 { font-size: 25px; margin-bottom: 8px; letter-spacing: -.03em; }
.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
.metric { padding: 10px; border-radius: 14px; background: rgba(255,255,255,.11); }
.metric strong { display: block; font-size: 18px; }
.metric span { font-size: 11px; color: rgba(255,255,255,.72); }

.week-toolbar { margin-bottom: 12px; }
.week-toolbar strong { font-size: 16px; text-transform: capitalize; }
.button-row { display: flex; gap: 8px; flex-wrap: wrap; }
.button, .chip-button {
  border: 0;
  cursor: pointer;
  border-radius: 13px;
  font-weight: 750;
}
.button { padding: 11px 14px; background: var(--primary); color: white; }
.button.secondary { background: var(--surface-2); color: var(--text); }
.button.ghost { background: transparent; border: 1px solid var(--line); color: var(--text); }
.button.danger { background: var(--red-soft); color: var(--red); }
.button.full { width: 100%; }
.button:disabled { opacity: .45; cursor: default; }
.chip-button { padding: 7px 10px; background: var(--surface-2); color: var(--muted); font-size: 12px; }
.chip-button.active { background: var(--red-soft); color: var(--red); }

.day-grid { display: grid; gap: 10px; }
.day-card { padding: 14px; }
.day-card.today { border-color: var(--primary); box-shadow: 0 12px 30px rgba(111,91,231,.16); }
.day-card.social { background: linear-gradient(180deg, #fff, #fff7fa); }
.day-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.day-head h3 { margin: 0; font-size: 17px; text-transform: capitalize; }
.day-head p { margin: 2px 0 0; }
.day-events { display: grid; gap: 7px; }
.event {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 9px;
  padding: 10px;
  border-radius: 14px;
  background: var(--surface-2);
  border: 1px solid transparent;
  cursor: pointer;
}
.event .event-icon { width: 32px; height: 32px; display: grid; place-content: center; border-radius: 10px; background: white; }
.event strong { display: block; font-size: 13px; }
.event small { color: var(--muted); }
.event.training { background: var(--primary-soft); color: #4939ad; }
.event.training.completed { background: var(--green-soft); color: #237758; }
.event.training.skipped { background: var(--red-soft); color: var(--red); }
.event.class { background: #eff3f7; }
.event.social-plan { background: #fff0f5; color: #a54269; }
.event.meal { background: #f4f1e8; color: #6e5a24; }
.empty-state { padding: 18px 10px; text-align: center; color: var(--muted); }

.pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 8px; border-radius: 999px; font-size: 11px; font-weight: 750; background: var(--surface-2); color: var(--muted); }
.pill.green { background: var(--green-soft); color: var(--green); }
.pill.amber { background: var(--amber-soft); color: var(--amber); }
.pill.red { background: var(--red-soft); color: var(--red); }
.pill.primary { background: var(--primary-soft); color: var(--primary); }

.segmented { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 4px; padding: 4px; border-radius: 15px; background: var(--surface-2); margin-bottom: 12px; overflow-x: auto; }
.segmented button { white-space: nowrap; border: 0; background: transparent; padding: 9px 10px; border-radius: 11px; font-weight: 750; color: var(--muted); cursor: pointer; }
.segmented button.active { background: white; color: var(--primary); box-shadow: 0 3px 12px rgba(51,40,83,.08); }

.exercise-row, .shopping-row, .meal-row, .progress-row {
  display: grid;
  align-items: center;
  gap: 9px;
  padding: 11px 0;
  border-bottom: 1px solid var(--line);
}
.exercise-row:last-child, .shopping-row:last-child, .meal-row:last-child, .progress-row:last-child { border-bottom: 0; }
.exercise-row { grid-template-columns: minmax(120px,1.5fr) repeat(3,minmax(55px,.6fr)) auto; }
.exercise-row .name strong { display: block; }
.inline-input { width: 100%; min-width: 0; border: 1px solid var(--line); border-radius: 10px; padding: 8px; background: var(--bg); color: var(--text); }
.text-button { border: 0; background: transparent; color: var(--primary); font-weight: 750; cursor: pointer; padding: 5px; }

.meal-day { margin-bottom: 12px; }
.meal-day h3 { text-transform: capitalize; }
.meal-row { grid-template-columns: 72px 1fr auto; }
.meal-row .meal-meta strong { display: block; }
.meal-summary { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

.shopping-category { margin-top: 15px; }
.shopping-category h3 { font-size: 14px; color: var(--muted); margin: 0 0 4px; text-transform: uppercase; letter-spacing: .06em; }
.shopping-row { grid-template-columns: auto minmax(115px,1fr) minmax(70px,.55fr) minmax(70px,.55fr); }
.shopping-row.done .item-name { text-decoration: line-through; color: var(--muted); }
.check { width: 22px; height: 22px; accent-color: var(--primary); }
.budget-bar { height: 10px; border-radius: 999px; background: var(--surface-2); overflow: hidden; margin-top: 10px; }
.budget-bar > span { height: 100%; display: block; background: var(--green); border-radius: inherit; transition: width .2s ease; }
.budget-bar.over > span { background: var(--red); }

.form-grid { display: grid; gap: 12px; }
.form-grid.two { grid-template-columns: 1fr 1fr; }
label.field { display: grid; gap: 6px; font-size: 13px; font-weight: 700; color: var(--muted); }
.field input, .field select, .field textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 11px;
  background: white;
  color: var(--text);
}
.field textarea { min-height: 88px; resize: vertical; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; }
.switch { position: relative; width: 48px; height: 28px; }
.switch input { opacity: 0; width: 0; height: 0; }
.switch span { position: absolute; inset: 0; border-radius: 999px; background: #cbc6d7; transition: .2s; cursor: pointer; }
.switch span::after { content: ""; position: absolute; width: 22px; height: 22px; left: 3px; top: 3px; border-radius: 50%; background: white; transition: .2s; box-shadow: 0 2px 7px rgba(0,0,0,.15); }
.switch input:checked + span { background: var(--primary); }
.switch input:checked + span::after { transform: translateX(20px); }

.notice { padding: 12px; border-radius: 14px; background: var(--amber-soft); color: #7a561c; font-size: 13px; }
.notice.primary { background: var(--primary-soft); color: #4b3bb0; }
.notice.green { background: var(--green-soft); color: #28765a; }

.chart-wrap { width: 100%; overflow: hidden; }
canvas { width: 100%; max-height: 220px; }

.modal {
  border: 0;
  padding: 0;
  width: min(calc(100% - 24px), 620px);
  max-height: 90dvh;
  border-radius: 24px;
  box-shadow: 0 30px 90px rgba(33,29,46,.30);
}
.modal::backdrop { background: rgba(30,25,43,.48); backdrop-filter: blur(4px); }
.modal-card { padding: 0; }
.modal-header { position: sticky; top: 0; z-index: 2; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 18px 18px 12px; background: white; border-bottom: 1px solid var(--line); }
.modal-header h2 { margin: 2px 0 0; font-size: 22px; }
.modal-body { padding: 16px 18px; max-height: 66dvh; overflow: auto; }
.modal-actions { position: sticky; bottom: 0; display: flex; justify-content: flex-end; gap: 8px; padding: 12px 18px calc(12px + env(safe-area-inset-bottom)); background: white; border-top: 1px solid var(--line); }

@media (min-width: 700px) {
  .main-content { padding-inline: 24px; }
  .day-grid { grid-template-columns: repeat(2, 1fr); }
  .day-card:first-child { grid-column: span 2; }
  .meal-week-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .meal-day { margin-bottom: 0; }
}

@media (max-width: 520px) {
  .exercise-row { grid-template-columns: 1fr 70px 58px 58px auto; font-size: 12px; }
  .shopping-row { grid-template-columns: auto 1fr 70px; }
  .shopping-row .price-input { grid-column: 3; }
  .form-grid.two { grid-template-columns: 1fr; }
}

/* Forma v2 */
.day-card.unavailable { background: linear-gradient(180deg, #fff, #fff8f0); border-color: #efd9ba; }
.unavailable-event { background: var(--amber-soft); color: #7a561c; }
.workout-list { display: grid; gap: 12px; }
.workout-card h2 { margin: 3px 0 4px; font-size: 19px; }
.mini-progress { height: 8px; border-radius: 999px; background: var(--surface-2); overflow: hidden; margin: 12px 0; }
.mini-progress span { display: block; height: 100%; border-radius: inherit; background: var(--primary); }
.routine-summary { margin-top: 10px; }
.routine-summary summary { cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.routine-summary summary::-webkit-details-marker { display: none; }
.routine-summary summary > span { color: var(--primary); font-weight: 750; font-size: 13px; }
.routine-list { margin-top: 14px; }
.routine-line, .class-line { display: grid; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid var(--line); }
.routine-line { grid-template-columns: 1fr auto; }
.routine-line small { display: block; color: var(--muted); margin-top: 2px; }
.class-line { grid-template-columns: 55px 1fr auto; }
.workout-exercises { display: grid; gap: 12px; margin: 16px 0; }
.workout-exercise { border: 1px solid var(--line); border-radius: 16px; padding: 13px; background: var(--bg); }
.exercise-title { display: flex; align-items: flex-start; gap: 10px; }
.exercise-title strong { display: block; }
.exercise-title small { display: block; color: var(--muted); margin-top: 3px; }
.exercise-check { padding-top: 1px; }
.exercise-help { margin: 10px 0; border-radius: 12px; background: white; padding: 9px 11px; }
.exercise-help summary { cursor: pointer; color: var(--primary); font-size: 13px; font-weight: 750; }
.exercise-help p { margin: 8px 0 1px; color: var(--muted); font-size: 13px; line-height: 1.45; }
.exercise-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
.exercise-inputs label { display: grid; gap: 4px; color: var(--muted); font-size: 11px; font-weight: 700; }
.exercise-inputs input { width: 100%; min-width: 0; padding: 9px 6px; border: 1px solid var(--line); border-radius: 10px; background: white; }
.field.compact { margin-top: 9px; }
.field.compact input { padding: 9px; }
.inset-card { margin-top: 12px; padding: 13px; border: 1px solid var(--line); border-radius: 14px; background: var(--bg); }
.inset-card p:first-child, .inset-card h3:first-child { margin-top: 0; }
.meal-detail-row { padding: 10px 0; border-bottom: 1px solid var(--line); }
.meal-detail-row:last-of-type { border-bottom: 0; }
.meal-main-button { width: 100%; border: 0; background: transparent; display: grid; grid-template-columns: 70px 1fr auto; gap: 8px; text-align: left; align-items: center; padding: 0; color: var(--text); cursor: pointer; }
.meal-main-button strong, .meal-main-button small { display: block; }
.meal-main-button small { color: var(--muted); margin-top: 2px; }
.meal-slot { color: var(--muted); font-size: 12px; font-weight: 750; }
.ingredient-list { list-style: none; margin: 8px 0 0 78px; padding: 0; display: flex; flex-wrap: wrap; gap: 6px; }
.ingredient-list li { padding: 5px 8px; border-radius: 999px; background: var(--surface-2); font-size: 11px; color: var(--muted); }
.ingredient-list li strong { color: var(--text); }
@media (min-width: 700px) {
  .workout-list { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 520px) {
  .exercise-inputs { grid-template-columns: repeat(2, 1fr); }
  .ingredient-list { margin-left: 0; }
  .meal-main-button { grid-template-columns: 62px 1fr auto; }
}

  </style>

<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="todayLabel">Tu plan</p>
        <h1 id="pageTitle">Semana</h1>
      </div>

      .replaceAll("'", '&#039;');

  function parseDate(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d, 12, 0, 0, 0);
  }

  function isoDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function addDays(isoOrDate, days) {
    const date = typeof isoOrDate === 'string' ? parseDate(isoOrDate) : new Date(isoOrDate);
    date.setDate(date.getDate() + days);
    return isoDate(date);
  }

  function startOfWeek(date = new Date()) {
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 12);
    d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    return isoDate(d);
  }

  }

  function getWeek(monday = state.ui.selectedWeek) {
    if (!state.weeks[monday]) state.weeks[monday] = createDefaultWeek(monday);
    normalizeWeek(state.weeks[monday]);
    for (let day = 0; day < 7; day += 1) {
      const date = addDays(monday, day);
      state.weeks[monday].meals[date] ||= { breakfast: 'breakfast-fixed', lunch: defaultMealTemplate[day].lunch, snack: defaultMealTemplate[day].snack, dinner: defaultMealTemplate[day].dinner };
    }
    saveState();
    return state.weeks[monday];
  }

  function unavailableEntry(week, date) {
    return week.unavailableDates.find(item => item.date === date) || null;
  }

  function sessionExercises(session) {
    if (session.type === 'bodypump') return bodyPumpExercises;
    return state.routines[session.routineKey || 'A']?.exercises || [];
  }

  function setRoute(route) {
    state.ui.route = route;
    saveState();
    render();
  }

  function nextWorkout() {
    const now = new Date();
    const today = isoDate(now);
    const nowClock = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    const currentMonday = startOfWeek(now);
    const selectedMonday = state.ui.selectedWeek;
    const selected = getWeek(selectedMonday).sessions.filter(s => s.status === 'planned');
    if (selectedMonday !== currentMonday) return selected.sort((a, b) => `${a.date}T${a.start}`.localeCompare(`${b.date}T${b.start}`))[0] || null;
    const future = selected.filter(s => s.date > today || (s.date === today && s.start >= nowClock)).sort((a, b) => `${a.date}T${a.start}`.localeCompare(`${b.date}T${b.start}`));
    if (future[0]) return future[0];
    return getWeek(addDays(currentMonday, 7)).sessions.filter(s => s.status === 'planned').sort((a, b) => `${a.date}T${a.start}`.localeCompare(`${b.date}T${b.start}`))[0] || null;
  }

  function render() {
    const route = state.ui.route;
    $$('.nav-item').forEach(btn => btn.classList.toggle('active', btn.dataset.route === route));
    const titles = { week: 'Semana', training: 'Entrenamiento', meals: 'Comidas', shopping: 'Lista de la compra', progress: 'Progreso' };
    $('#pageTitle').textContent = titles[route] || 'Forma';
    $('#todayLabel').textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
    if (route === 'week') renderWeek();
    if (route === 'training') renderTraining();
    if (route === 'meals') renderMeals();
    if (route === 'shopping') renderShopping();
    if (route === 'progress') renderProgress();
  }

  function workoutProgress(session) {
    const exercises = sessionExercises(session);
    const done = exercises.filter(ex => session.workoutLog?.[ex.id]?.done).length;
    return { done, total: exercises.length };
  }

  function renderWeek() {
    const monday = state.ui.selectedWeek;
    const week = getWeek(monday);
    const completed = week.sessions.filter(s => !s.optional && s.status === 'completed').length;
    const required = week.sessions.filter(s => !s.optional).length;
    const next = nextWorkout();

    const daysHtml = Array.from({ length: 7 }, (_, day) => {
      const date = addDays(monday, day);
      const uni = state.university.find(item => item.day === day);
      const sessions = week.sessions.filter(s => s.date === date).sort((a, b) => a.start.localeCompare(b.start));
      const unavailable = unavailableEntry(week, date);
      const isToday = date === isoDate(new Date());
      const events = [];
      if (uni) events.push(`<div class="event class"><span class="event-icon">🎓</span><div><strong>${escapeHtml(uni.label)}</strong><small>${uni.start}–${uni.end}</small></div><span></span></div>`);
      sessions.forEach(session => {
        const icon = session.type === 'bodypump' ? '🏋️' : '💪';
        const progress = workoutProgress(session);
        const statusIcon = session.status === 'completed' ? '✓' : session.status === 'skipped' ? '×' : '›';
        const detail = session.status === 'planned' && progress.done ? `${progress.done}/${progress.total} ejercicios · ` : '';
        events.push(`<button class="event training ${session.status}" data-action="open-workout" data-id="${session.id}"><span class="event-icon">${icon}</span><div><strong>${escapeHtml(session.name)}${session.optional ? ' · opcional' : ''}</strong><small>${detail}${session.start} · ${session.duration} min</small></div><span>${statusIcon}</span></button>`);
      });
      if (unavailable) events.push(`<div class="event unavailable-event"><span class="event-icon">🚫</span><div><strong>No puedo entrenar</strong><small>${escapeHtml(unavailable.reason || 'Día bloqueado')}${unavailable.lunchOutside || unavailable.dinnerOutside ? ' · comida ajustada' : ''}</small></div><span></span></div>`);
      return `<article class="card day-card ${isToday ? 'today' : ''} ${unavailable ? 'unavailable' : ''}">
        <div class="day-head"><div><h3>${DAY_NAMES[day]}</h3><p class="muted small">${formatDate(date, { day: 'numeric', month: 'long' })}</p></div>
        <button class="chip-button ${unavailable ? 'active' : ''}" data-action="availability" data-date="${date}">${unavailable ? 'Día bloqueado' : 'No puedo entrenar'}</button></div>
        <div class="day-events">${events.length ? events.join('') : '<div class="empty-state">Sin eventos</div>'}</div>
      </article>`;
    }).join('');

    $('#mainContent').innerHTML = `
      <section class="card hero"><p class="eyebrow">Objetivo · ${escapeHtml(state.profile.goal)}</p><h2>${next ? `${escapeHtml(next.name)} · ${formatDate(next.date)} a las ${next.start}` : 'Semana lista'}</h2><p class="muted">Marca los días en los que no puedes entrenar y la app recolocará las sesiones y el extra asociado al entrenamiento.</p><div class="metric-grid"><div class="metric"><strong>${completed}/${required}</strong><span>sesiones base</span></div><div class="metric"><strong>${state.profile.calorieTarget}</strong><span>kcal orientativas</span></div><div class="metric"><strong>${state.profile.proteinTarget} g</strong><span>proteína</span></div></div></section>
      <section class="section"><div class="week-toolbar"><button class="button secondary" data-action="prev-week">‹</button><strong>${formatWeekRange(monday)}</strong><button class="button secondary" data-action="next-week">›</button></div><div class="button-row"><button class="button" data-action="reorganize">Reorganizar semana</button><button class="button ghost" data-action="today-week">Semana actual</button></div></section>
      <section class="section day-grid">${daysHtml}</section>
      <section class="section card notice primary"><strong>Disponibilidad aplicada:</strong> de lunes a viernes la reorganización no utiliza horas anteriores a las ${state.settings.weekdayEarliest}. Esta hora se puede cambiar en Progreso → Ajustes.</section>`;
  }

  function isAllowedCandidate(day, start) {
    if (day >= 5) return true;
    return timeToMinutes(start) >= timeToMinutes(state.settings.weekdayEarliest || '15:30');
  }

  function scheduleConflict(week, date, start, end, ignoreSessionId = null) {
    const day = dayIndexFromIso(date);
    const startMin = timeToMinutes(start);
    const endMin = timeToMinutes(end);
    const uni = state.university.find(item => item.day === day);
    if (uni && startMin < timeToMinutes(uni.end) && endMin > timeToMinutes(uni.start)) return true;
    return week.sessions.some(s => s.id !== ignoreSessionId && s.date === date && s.status !== 'skipped' && startMin < timeToMinutes(s.start) + Number(s.duration || 60) && endMin > timeToMinutes(s.start));
  }

  function candidateList(session, monday) {
    let candidates = [];
    if (session.type === 'bodypump') {
      candidates = state.gymClasses.filter(c => c.name.toLowerCase().includes('bodypump'));
    } else if ((session.routineKey || 'A') === 'A') {
      candidates = [
        ...state.gymClasses.filter(c => c.name.toLowerCase().includes('strength')),
        { day: 0, name: 'Fuerza A', start: '19:30', end: '20:30' },
        { day: 1, name: 'Fuerza A', start: '18:00', end: '19:00' },
        { day: 2, name: 'Fuerza A', start: '18:30', end: '19:30' },
        { day: 3, name: 'Fuerza A', start: '17:30', end: '18:30' },
        { day: 4, name: 'Fuerza A', start: '17:00', end: '18:00' },
        { day: 5, name: 'Fuerza A', start: '12:00', end: '13:00' },
        { day: 6, name: 'Fuerza A', start: '11:00', end: '12:00' }
      ];
    } else {
      candidates = [
        { day: 1, name: 'Fuerza B', start: '18:00', end: '18:50' },
        { day: 3, name: 'Fuerza B', start: '17:30', end: '18:20' },
        { day: 5, name: 'Fuerza B', start: '12:00', end: '12:50' },
        { day: 6, name: 'Fuerza B', start: '11:00', end: '11:50' }
      ];
    }
    return candidates.map(c => ({ ...c, date: addDays(monday, c.day) })).filter(c => isAllowedCandidate(c.day, c.start));
  }

  function adaptMealsAfterMove(week, oldDate, newDate) {
    const oldPlan = week.meals[oldDate];
    const newPlan = week.meals[newDate];
    if (!oldPlan || !newPlan) return;
    const oldStillTrains = week.sessions.some(s => s.date === oldDate && s.status === 'planned');
    if (!newPlan.snack) newPlan.snack = oldPlan.snack || 'milk-banana';
    if (!oldStillTrains && unavailableEntry(week, oldDate) && ['milk-banana', 'yogurt-fruit'].includes(oldPlan.snack)) oldPlan.snack = null;
  }

  function reorganizeWeek(silent = false) {
    const monday = state.ui.selectedWeek;
    const week = getWeek(monday);
    const blockedDates = new Set(week.unavailableDates.map(item => item.date));
    const sessionsToMove = week.sessions.filter(s => s.status === 'planned' && blockedDates.has(s.date));
    const moved = [];
    const blocked = [];

    sessionsToMove.forEach(session => {
      const originalDay = dayIndexFromIso(session.date);
      const candidates = candidateList(session, monday)
        .filter(c => !blockedDates.has(c.date))
        .filter(c => !scheduleConflict(week, c.date, c.start, c.end, session.id))
        .sort((a, b) => Math.abs(a.day - originalDay) - Math.abs(b.day - originalDay) || a.start.localeCompare(b.start));
      const candidate = candidates[0];
      if (!candidate) {
        blocked.push(session.name);
        return;
      }
      const oldDate = session.date;
      session.date = candidate.date;
      session.start = candidate.start;
      session.duration = durationBetween(candidate.start, candidate.end);
      if (session.type === 'bodypump') session.name = 'BodyPump';
      adaptMealsAfterMove(week, oldDate, session.date);
      moved.push(`${formatDate(oldDate)} → ${formatDate(session.date)} ${session.start}`);
    });

    week.unavailableDates.forEach(item => {
      const plan = week.meals[item.date];
      if (!plan) return;
      if (item.lunchOutside) plan.lunch = 'social-meal';
      if (item.dinnerOutside) plan.dinner = 'social-meal';
      if (!week.sessions.some(s => s.date === item.date && s.status === 'planned') && ['milk-banana', 'yogurt-fruit'].includes(plan.snack)) plan.snack = null;
    });

    saveState();
    render();
    if (!silent) {
      const message = moved.length ? `Sesiones recolocadas:\n• ${moved.join('\n• ')}` : 'No había entrenamientos que mover.';
      alert(`${message}${blocked.length ? `\n\nNo he encontrado hueco automático para: ${blocked.join(', ')}. Puedes editar esa sesión manualmente.` : ''}`);
    } else if (blocked.length) {
      alert(`El día se ha bloqueado, pero no he encontrado hueco automático para: ${blocked.join(', ')}. Puedes editar la sesión manualmente.`);
    }
  }

  function renderTraining() {
    const monday = state.ui.selectedWeek;
    const week = getWeek(monday);
    const sessions = [...week.sessions].sort((a, b) => `${a.date}T${a.start}`.localeCompare(`${b.date}T${b.start}`));
    const sessionCards = sessions.map(session => {
      const p = workoutProgress(session);
      const pct = p.total ? Math.round((p.done / p.total) * 100) : 0;
      return `<article class="card workout-card"><div class="row-between"><div><p class="eyebrow">${DAY_NAMES[dayIndexFromIso(session.date)]} · ${formatDate(session.date)}</p><h2>${escapeHtml(session.name)}${session.optional ? ' · opcional' : ''}</h2><p class="muted small">${session.start} · ${session.duration} min</p></div><span class="pill ${session.status === 'completed' ? 'green' : p.done ? 'amber' : 'primary'}">${session.status === 'completed' ? 'Completado' : `${p.done}/${p.total}`}</span></div><div class="mini-progress"><span style="width:${session.status === 'completed' ? 100 : pct}%"></span></div><button class="button full" data-action="open-workout" data-id="${session.id}">${p.done ? 'Continuar entrenamiento' : 'Abrir entrenamiento'}</button></article>`;
    }).join('');

    const routines = Object.entries(state.routines).map(([key, routine]) => `<details class="card routine-summary"><summary><div><p class="eyebrow">Rutina ${key}</p><strong>${escapeHtml(routine.name)}</strong></div><span>Ver ejercicios</span></summary><div class="routine-list">${routine.exercises.map(ex => `<div class="routine-line"><div><strong>${escapeHtml(ex.name)}</strong><small>${ex.sets} × ${escapeHtml(ex.reps)}</small></div><button class="text-button" data-action="edit-exercise" data-routine="${key}" data-id="${ex.id}">Editar</button></div>`).join('')}<button class="button secondary full" data-action="add-exercise" data-routine="${key}">Añadir ejercicio</button></div></details>`).join('');

    const classes = DAY_NAMES.map((name, day) => {
      const items = state.gymClasses.filter(c => c.day === day).sort((a, b) => a.start.localeCompare(b.start));
      if (!items.length) return '';
      return `<div class="shopping-category"><h3>${name}</h3>${items.map(c => `<div class="class-line"><span>${c.start}</span><strong>${escapeHtml(c.name)}</strong><button class="text-button" data-action="edit-class" data-id="${c.id}">Editar</button></div>`).join('')}</div>`;
    }).join('');

    $('#mainContent').innerHTML = `
      <section class="card hero"><p class="eyebrow">Registro dentro de cada sesión</p><h2>Entrena y anota en el mismo sitio</h2><p class="muted">Abre el entrenamiento, consulta la explicación de cada ejercicio y guarda peso, series, repeticiones y sensaciones mientras avanzas.</p></section>
      <section class="section week-toolbar"><button class="button secondary" data-action="prev-week">‹</button><strong>${formatWeekRange(monday)}</strong><button class="button secondary" data-action="next-week">›</button></section>
      <section class="section workout-list">${sessionCards}</section>
      <section class="section"><div class="section-title-row"><h2>Rutinas editables</h2></div>${routines}</section>
      <details class="section card routine-summary"><summary><div><p class="eyebrow">Horario editable</p><strong>Clases del gimnasio</strong></div><span>Mostrar</span></summary><div class="routine-list">${classes}<button class="button secondary full" data-action="add-class">Añadir clase</button></div></details>`;
  }

  function lastExercisePerformance(exerciseId, beforeDate = '9999-12-31', excludeSessionId = null) {
    const entries = [];
    Object.values(state.weeks).forEach(week => (week.sessions || []).forEach(session => {
      if (session.id === excludeSessionId || session.date > beforeDate) return;
      const log = session.workoutLog?.[exerciseId];
      if (log && (log.weight !== '' || log.reps || log.done)) entries.push({ ...log, date: session.date, sessionName: session.name });
    }));
    return entries.sort((a, b) => b.date.localeCompare(a.date))[0] || null;
  }

  function openWorkoutModal(sessionId) {
    const week = getWeek();
    const session = week.sessions.find(s => s.id === sessionId);
    if (!session) return;
    const exercises = sessionExercises(session);
    const rows = exercises.map(ex => {
      const log = session.workoutLog?.[ex.id] || {};
      const last = lastExercisePerformance(ex.id, session.date, session.id);
      return `<article class="workout-exercise" data-exercise="${ex.id}"><div class="exercise-title"><label class="exercise-check"><input type="checkbox" class="check" data-field="done" ${log.done ? 'checked' : ''}><span></span></label><div><strong>${escapeHtml(ex.name)}</strong><small>${ex.sets} × ${escapeHtml(ex.reps)}${last ? ` · Anterior: ${last.weight || '—'} kg, ${escapeHtml(last.reps || '')}` : ''}</small></div></div><details class="exercise-help"><summary>Cómo hacerlo</summary><p>${escapeHtml(ex.explanation || 'Mantén una técnica controlada y detén la serie si aparece dolor.')}</p></details><div class="exercise-inputs"><label>Peso kg<input type="number" min="0" step="0.25" data-field="weight" value="${log.weight ?? last?.weight ?? ''}"></label><label>Series<input type="number" min="1" data-field="sets" value="${log.sets ?? ex.sets}"></label><label>Reps<input data-field="reps" value="${escapeHtml(log.reps ?? ex.reps)}"></label><label>RIR<input type="number" min="0" max="5" data-field="rir" value="${log.rir ?? 2}"></label></div><label class="field compact">Notas<input data-field="notes" value="${escapeHtml(log.notes || '')}" placeholder="Técnica, molestias, próxima subida..."></label></article>`;
    }).join('');

    openModal({
      eyebrow: `${DAY_NAMES[dayIndexFromIso(session.date)]} · ${formatDate(session.date)}`,
      title: session.name,
      body: `<div class="form-grid two"><label class="field">Fecha<input id="sessionDate" type="date" value="${session.date}"></label><label class="field">Hora<input id="sessionStart" type="time" value="${session.start}"></label><label class="field">Duración (min)<input id="sessionDuration" type="number" min="15" value="${session.duration}"></label><label class="field">Estado<select id="sessionStatus"><option value="planned" ${session.status === 'planned' ? 'selected' : ''}>Planificado</option><option value="completed" ${session.status === 'completed' ? 'selected' : ''}>Completado</option><option value="skipped" ${session.status === 'skipped' ? 'selected' : ''}>No realizado</option></select></label></div><div class="notice primary" style="margin-top:12px">Marca cada ejercicio al terminarlo. Puedes guardar aunque el entrenamiento esté a medias y continuar después.</div><div class="workout-exercises">${rows}</div><label class="field">Notas generales<textarea id="sessionNotes">${escapeHtml(session.notes || '')}</textarea></label>`,
      actions: '<button type="button" class="button danger" id="deleteSession">Eliminar</button><button type="button" class="button secondary" id="cancelModal">Cerrar</button><button type="button" class="button" id="saveWorkout">Guardar progreso</button>'
    });
    $('#cancelModal').onclick = closeModal;
    $('#deleteSession').onclick = () => { if (confirm('¿Eliminar este entrenamiento?')) { week.sessions = week.sessions.filter(s => s.id !== session.id); saveState(); closeModal(); render(); } };
    $('#saveWorkout').onclick = () => {
      session.date = $('#sessionDate').value;
      session.start = $('#sessionStart').value;
      session.duration = Number($('#sessionDuration').value || 60);
      session.status = $('#sessionStatus').value;
      session.notes = $('#sessionNotes').value.trim();
      session.workoutLog ||= {};
      $$('.workout-exercise', $('#modalBody')).forEach(row => {
        const exId = row.dataset.exercise;
        const value = field => $(`[data-field="${field}"]`, row);
        session.workoutLog[exId] = {
          done: value('done').checked,
          weight: value('weight').value === '' ? '' : Number(value('weight').value),
          sets: Number(value('sets').value || 0),
          reps: value('reps').value.trim(),
          rir: value('rir').value === '' ? '' : Number(value('rir').value),
          notes: value('notes').value.trim()
        };
      });
      const allDone = exercises.length && exercises.every(ex => session.workoutLog[ex.id]?.done);
      if (allDone && session.status === 'planned') session.status = 'completed';
      saveState(); closeModal(); render();
    };
  }

  function openSessionCreateModal() {
    openModal({ eyebrow: 'Plan semanal', title: 'Añadir entrenamiento', body: `<div class="form-grid two"><label class="field">Tipo<select id="newSessionType"><option value="bodypump">BodyPump</option><option value="A">Fuerza A</option><option value="B">Fuerza B</option></select></label><label class="field">Fecha<input id="newSessionDate" type="date" value="${state.ui.selectedWeek}"></label><label class="field">Hora<input id="newSessionStart" type="time" value="18:00"></label><label class="field">Duración<input id="newSessionDuration" type="number" value="60"></label></div><label class="toggle-row"><span>Sesión opcional</span><span class="switch"><input id="newSessionOptional" type="checkbox"><span></span></span></label>`, actions: '<button type="button" class="button secondary" id="cancelModal">Cancelar</button><button type="button" class="button" id="saveNewSession">Añadir</button>' });
    $('#cancelModal').onclick = closeModal;
    $('#saveNewSession').onclick = () => {
      const type = $('#newSessionType').value;
      const session = { id: uid(), date: $('#newSessionDate').value, start: $('#newSessionStart').value, duration: Number($('#newSessionDuration').value || 60), status: 'planned', optional: $('#newSessionOptional').checked, notes: '', workoutLog: {} };
      if (type === 'bodypump') Object.assign(session, { name: 'BodyPump', type: 'bodypump', routineKey: null });
      else Object.assign(session, { name: `Fuerza ${type}`, type: 'strength', routineKey: type });
      getWeek(startOfWeek(parseDate(session.date))).sessions.push(session);
      saveState(); closeModal(); render();
    };
  }

  function openAvailabilityModal(date) {
    const week = getWeek(startOfWeek(parseDate(date)));
    const current = unavailableEntry(week, date);
    openModal({
      eyebrow: `${DAY_NAMES[dayIndexFromIso(date)]} · ${formatDate(date)}`,
      title: current ? 'Editar día bloqueado' : 'No puedo entrenar este día',
      body: `<p class="muted">La app moverá los entrenamientos de este día a otro hueco compatible. Entre semana no usará horas anteriores a las ${state.settings.weekdayEarliest}.</p><label class="field">Motivo opcional<input id="availabilityReason" value="${escapeHtml(current?.reason || '')}" placeholder="Viaje, estudio, cansancio tras salir..."></label><div class="card inset-card"><p><strong>¿También comerás fuera?</strong></p><label class="toggle-row"><span>Comida fuera</span><span class="switch"><input id="availabilityLunch" type="checkbox" ${current?.lunchOutside ? 'checked' : ''}><span></span></span></label><label class="toggle-row"><span>Cena fuera</span><span class="switch"><input id="availabilityDinner" type="checkbox" ${current?.dinnerOutside ? 'checked' : ''}><span></span></span></label></div><p class="muted small">Si marcas una comida, se sustituirá por “comida o cena fuera”. El extra de entrenamiento se moverá al nuevo día.</p>`,
      actions: `${current ? '<button type="button" class="button danger" id="removeUnavailable">Volver a dejar disponible</button>' : ''}<button type="button" class="button secondary" id="cancelModal">Cancelar</button><button type="button" class="button" id="saveUnavailable">Guardar y reorganizar</button>`
    });
    $('#cancelModal').onclick = closeModal;
    if ($('#removeUnavailable')) $('#removeUnavailable').onclick = () => { week.unavailableDates = week.unavailableDates.filter(item => item.date !== date); saveState(); closeModal(); render(); };
    $('#saveUnavailable').onclick = () => {
      const entry = { date, reason: $('#availabilityReason').value.trim(), lunchOutside: $('#availabilityLunch').checked, dinnerOutside: $('#availabilityDinner').checked };
      week.unavailableDates = week.unavailableDates.filter(item => item.date !== date);
      week.unavailableDates.push(entry);
      state.ui.selectedWeek = startOfWeek(parseDate(date));
      saveState(); closeModal(); reorganizeWeek(true);
    };
  }

  function renderIngredientList(meal) {
    if (!meal?.ingredients?.length) return '<span class="muted tiny">Sin ingredientes para comprar</span>';
    return `<ul class="ingredient-list">${meal.ingredients.map(ing => `<li><strong>${Number(ing.quantity)} ${escapeHtml(ing.unit)}</strong> ${escapeHtml(ing.name)}</li>`).join('')}</ul>`;
  }

  function renderMeals() {
    const monday = state.ui.selectedWeek;
    const week = getWeek(monday);
    const days = Array.from({ length: 7 }, (_, day) => {
      const date = addDays(monday, day);
      const plan = week.meals[date];
      let kcal = 0;
      let protein = 0;
      const rows = ['breakfast', 'lunch', 'snack', 'dinner'].map(slot => {
        const meal = mealById(plan?.[slot]);
        if (meal) { kcal += Number(meal.kcal || 0); protein += Number(meal.protein || 0); }

  function generatedShoppingItems() {
    const week = getWeek();
    const aggregate = new Map();
    Object.values(week.meals).forEach(plan => Object.values(plan || {}).forEach(mealId => {
      const meal = mealById(mealId);
      if (!meal) return;
      meal.ingredients.forEach(ing => {
        const key = `${ing.name}|${ing.unit}`;
        if (!aggregate.has(key)) aggregate.set(key, { key, name: ing.name, quantity: 0, unit: ing.unit, category: ing.category || 'Otros' });
        aggregate.get(key).quantity += Number(ing.quantity || 0);
      });
    }));
    return [...aggregate.values()].map(item => {
      const catalog = priceCatalog[item.key];
      const estimated = catalog ? Math.ceil(item.quantity / catalog.packQty) * catalog.packPrice : 0;
      return { ...item, estimated: Number(estimated.toFixed(2)) };
    });
  }

  function shoppingStatusFor(item) {
    const week = getWeek();
    if (!week.shoppingStatus[item.key]) week.shoppingStatus[item.key] = { bought: false, have: false, cost: item.estimated, quantityText: `${Math.ceil(item.quantity)} ${item.unit}` };
    return week.shoppingStatus[item.key];
  }

  function shoppingTotal() {
    let total = 0;
    generatedShoppingItems().forEach(item => { const status = shoppingStatusFor(item); if (!status.have) total += Number(status.cost || 0); });

    return total;
  }

  function drawProgressChart() {
    const canvas = $('#progressChart');
    if (!canvas) return;
    const entries = [...state.progress].filter(e => e.weight).sort((a, b) => a.date.localeCompare(b.date));
    const rect = canvas.getBoundingClientRect();
    const scale = window.devicePixelRatio || 1;
    canvas.width = Math.max(300, rect.width) * scale;
    canvas.height = 210 * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    const width = canvas.width / scale;
    const height = canvas.height / scale;
    ctx.clearRect(0, 0, width, height);
    if (entries.length < 2) { ctx.fillStyle = '#716b80'; ctx.font = '14px system-ui'; ctx.textAlign = 'center'; ctx.fillText('Añade al menos dos mediciones', width / 2, height / 2); return; }
    const weights = entries.map(e => Number(e.weight));
    const min = Math.min(...weights) - 0.5;
    const max = Math.max(...weights) + 0.5;
    const pad = { left: 34, right: 14, top: 20, bottom: 28 };
    const x = i => pad.left + (i / (entries.length - 1)) * (width - pad.left - pad.right);
    const y = value => pad.top + ((max - value) / (max - min || 1)) * (height - pad.top - pad.bottom);
    ctx.strokeStyle = '#e4e0ec'; ctx.lineWidth = 1;
    for (let i = 0; i < 4; i += 1) { const yy = pad.top + i * ((height - pad.top - pad.bottom) / 3); ctx.beginPath(); ctx.moveTo(pad.left, yy); ctx.lineTo(width - pad.right, yy); ctx.stroke(); }
    ctx.strokeStyle = '#6f5be7'; ctx.lineWidth = 3; ctx.beginPath(); weights.forEach((w, i) => i ? ctx.lineTo(x(i), y(w)) : ctx.moveTo(x(i), y(w))); ctx.stroke();
    ctx.fillStyle = '#6f5be7'; weights.forEach((w, i) => { ctx.beginPath(); ctx.arc(x(i), y(w), 4, 0, Math.PI * 2); ctx.fill(); });
  }

  function shoppingRowContext(target) {
    const row = target.closest('.shopping-row');
    if (!row) return null;
    const custom = row.dataset.custom === 'true';
    const key = row.dataset.key;
    if (custom) return { custom, key, item: getWeek().customShopping.find(i => i.id === key) };
    const item = generatedShoppingItems().find(i => i.key === key);
    return { custom, key, item, status: item ? shoppingStatusFor(item) : null };
  }

    if (['shopping-bought', 'shopping-have', 'delete-shopping'].includes(action)) {
      const ctx = shoppingRowContext(target); if (!ctx?.item) return;
      const status = ctx.custom ? ctx.item : ctx.status;
      if (action === 'shopping-bought') status.bought = target.checked;
      if (action === 'shopping-have') status.have = !status.have;
      if (action === 'delete-shopping' && ctx.custom) getWeek().customShopping = getWeek().customShopping.filter(i => i.id !== ctx.key);
      saveState(); render();
    }
    if (action === 'copy-shopping') {
      const lines = [];
      generatedShoppingItems().forEach(item => { const s = shoppingStatusFor(item); if (!s.have) lines.push(`${s.bought ? '✓' : '☐'} ${item.name} — ${s.quantityText}`); });
      getWeek().customShopping.forEach(item => { if (!item.have) lines.push(`${item.bought ? '✓' : '☐'} ${item.name} — ${item.quantityText}`); });
      navigator.clipboard?.writeText(lines.join('\n')).then(() => alert('Lista copiada.')).catch(() => alert(lines.join('\n')));
    }
    if (action === 'reset-shopping-checks') { Object.values(getWeek().shoppingStatus).forEach(s => { s.bought = false; }); getWeek().customShopping.forEach(i => { i.bought = false; }); saveState(); render(); }

      state.profile.stepTarget = Number($('#settingSteps').value || 5000);
      state.settings.weekdayEarliest = $('#settingEarliest').value || '15:30';
      saveState(); render();

    if (action === 'export-data') { const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `forma-copia-${isoDate(new Date())}.json`; a.click(); URL.revokeObjectURL(url); }
    if (action === 'import-data') $('#importInput').click();

  $('#importInput').addEventListener('change', event => {
    const file = event.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const imported = JSON.parse(reader.result);
        state = imported.version === 1 ? migrateLegacy(imported) : imported;
        if (state.version !== 2) throw new Error('Versión incompatible');
        saveState(); render(); alert('Datos importados correctamente.');
      } catch (error) { alert('No se pudo importar el archivo.'); }
      event.target.value = '';
    };
    reader.readAsText(file);
  });

  // Service worker disabled in the single-file edition.
  getWeek();
  render();
})();

  </script>
</body>
</html>
