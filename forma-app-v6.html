<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Forma" />
  <meta name="description" content="Plan personal de entrenamiento, comidas, compra y progreso." />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Forma · Plan interactivo v6</title>
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <style>
:root {
  --bg: #f6f4fb;
  --surface: #ffffff;
  --surface-2: #f0edf8;
  --text: #211d2e;
  --muted: #716b80;
  --line: #e4e0ec;
  --primary: #6f5be7;
  --primary-soft: #ebe7ff;
  --accent: #ef7da8;
  --green: #2f9b72;
  --green-soft: #e4f5ee;
  --amber: #b97716;
  --amber-soft: #fff1d7;
  --red: #bd4d5b;
  --red-soft: #ffe9ec;
  --shadow: 0 14px 40px rgba(54, 44, 90, 0.10);
  --radius: 20px;
  --safe-bottom: max(12px, env(safe-area-inset-bottom));
}

* { box-sizing: border-box; }
html { background: var(--bg); }
body {
  margin: 0;
  color: var(--text);
  background:
    radial-gradient(circle at 100% 0%, rgba(111,91,231,.12), transparent 28%),
    var(--bg);
  font-family: Inter, ui-rounded, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font: inherit; }
button { -webkit-tap-highlight-color: transparent; }

.app-shell { min-height: 100dvh; padding-bottom: 94px; }
.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: max(18px, env(safe-area-inset-top)) 18px 12px;
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter: blur(18px);
}
.topbar h1 { margin: 1px 0 0; font-size: 28px; letter-spacing: -.04em; }
.eyebrow { margin: 0; color: var(--muted); font-size: 12px; font-weight: 750; text-transform: uppercase; letter-spacing: .09em; }
.main-content { width: min(100%, 940px); margin: 0 auto; padding: 6px 16px 24px; }

.bottom-nav {
  position: fixed;
  z-index: 30;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  width: min(100%, 760px);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  padding: 9px 8px var(--safe-bottom);
  border-top: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
  background: color-mix(in srgb, white 92%, transparent);
  backdrop-filter: blur(22px);
}
.nav-item {
  border: 0;
  background: transparent;
  color: var(--muted);
  min-height: 55px;
  border-radius: 15px;
  display: grid;
  place-content: center;
  gap: 3px;
  cursor: pointer;
}
.nav-item span { font-size: 21px; line-height: 1; }
.nav-item small { font-size: 11px; font-weight: 700; }
.nav-item.active { color: var(--primary); background: var(--primary-soft); }

.icon-button {
  border: 0;
  width: 42px;
  height: 42px;
  border-radius: 14px;
  color: white;
  background: var(--primary);
  font-size: 26px;
  line-height: 1;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(111,91,231,.23);
}
.icon-button.secondary { background: var(--surface-2); color: var(--text); box-shadow: none; }

.card {
  background: var(--surface);
  border: 1px solid rgba(226, 222, 236, .9);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
}
.card + .card { margin-top: 12px; }
.card h2, .card h3, .card p { margin-top: 0; }
.card-title-row, .section-title-row, .week-toolbar, .row-between {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.section { margin-top: 18px; }
.section-title-row { margin: 0 2px 9px; }
.section-title-row h2 { margin: 0; font-size: 18px; }
.muted { color: var(--muted); }
.small { font-size: 13px; }
.tiny { font-size: 11px; }

.hero {
  background: linear-gradient(135deg, #2d2745 0%, #6452d2 75%, #8d75ef 100%);
  color: white;
  overflow: hidden;
  position: relative;
}
.hero::after {
  content: "";
  position: absolute;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  right: -65px;
  top: -90px;
  background: rgba(255,255,255,.10);
}
.hero .muted { color: rgba(255,255,255,.72); }
.hero h2 { font-size: 25px; margin-bottom: 8px; letter-spacing: -.03em; }
.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
.metric { padding: 10px; border-radius: 14px; background: rgba(255,255,255,.11); }
.metric strong { display: block; font-size: 18px; }
.metric span { font-size: 11px; color: rgba(255,255,255,.72); }

.week-toolbar { margin-bottom: 12px; }
.week-toolbar strong { font-size: 16px; text-transform: capitalize; }
.button-row { display: flex; gap: 8px; flex-wrap: wrap; }
.button, .chip-button {
  border: 0;
  cursor: pointer;
  border-radius: 13px;
  font-weight: 750;
}
.button { padding: 11px 14px; background: var(--primary); color: white; }
.button.secondary { background: var(--surface-2); color: var(--text); }
.button.ghost { background: transparent; border: 1px solid var(--line); color: var(--text); }
.button.danger { background: var(--red-soft); color: var(--red); }
.button.full { width: 100%; }
.button:disabled { opacity: .45; cursor: default; }
.chip-button { padding: 7px 10px; background: var(--surface-2); color: var(--muted); font-size: 12px; }
.chip-button.active { background: var(--red-soft); color: var(--red); }

.day-grid { display: grid; gap: 10px; }
.day-card { padding: 14px; }
.day-card.today { border-color: var(--primary); box-shadow: 0 12px 30px rgba(111,91,231,.16); }
.day-card.social { background: linear-gradient(180deg, #fff, #fff7fa); }
.day-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.day-head h3 { margin: 0; font-size: 17px; text-transform: capitalize; }
.day-head p { margin: 2px 0 0; }
.day-events { display: grid; gap: 7px; }
.event {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 9px;
  padding: 10px;
  border-radius: 14px;
  background: var(--surface-2);
  border: 1px solid transparent;
  cursor: pointer;
}
.event .event-icon { width: 32px; height: 32px; display: grid; place-content: center; border-radius: 10px; background: white; }
.event strong { display: block; font-size: 13px; }
.event small { color: var(--muted); }
.event.training { background: var(--primary-soft); color: #4939ad; }
.event.training.completed { background: var(--green-soft); color: #237758; }
.event.training.skipped { background: var(--red-soft); color: var(--red); }
.event.class { background: #eff3f7; }
.event.social-plan { background: #fff0f5; color: #a54269; }
.event.meal { background: #f4f1e8; color: #6e5a24; }
.empty-state { padding: 18px 10px; text-align: center; color: var(--muted); }

.pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 8px; border-radius: 999px; font-size: 11px; font-weight: 750; background: var(--surface-2); color: var(--muted); }
.pill.green { background: var(--green-soft); color: var(--green); }
.pill.amber { background: var(--amber-soft); color: var(--amber); }
.pill.red { background: var(--red-soft); color: var(--red); }
.pill.primary { background: var(--primary-soft); color: var(--primary); }

.segmented { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 4px; padding: 4px; border-radius: 15px; background: var(--surface-2); margin-bottom: 12px; overflow-x: auto; }
.segmented button { white-space: nowrap; border: 0; background: transparent; padding: 9px 10px; border-radius: 11px; font-weight: 750; color: var(--muted); cursor: pointer; }
.segmented button.active { background: white; color: var(--primary); box-shadow: 0 3px 12px rgba(51,40,83,.08); }

.exercise-row, .shopping-row, .meal-row, .progress-row {
  display: grid;
  align-items: center;
  gap: 9px;
  padding: 11px 0;
  border-bottom: 1px solid var(--line);
}
.exercise-row:last-child, .shopping-row:last-child, .meal-row:last-child, .progress-row:last-child { border-bottom: 0; }
.exercise-row { grid-template-columns: minmax(120px,1.5fr) repeat(3,minmax(55px,.6fr)) auto; }
.exercise-row .name strong { display: block; }
.inline-input { width: 100%; min-width: 0; border: 1px solid var(--line); border-radius: 10px; padding: 8px; background: var(--bg); color: var(--text); }
.text-button { border: 0; background: transparent; color: var(--primary); font-weight: 750; cursor: pointer; padding: 5px; }

.meal-day { margin-bottom: 12px; }
.meal-day h3 { text-transform: capitalize; }
.meal-row { grid-template-columns: 72px 1fr auto; }
.meal-row .meal-meta strong { display: block; }
.meal-summary { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

.shopping-category { margin-top: 15px; }
.shopping-category h3 { font-size: 14px; color: var(--muted); margin: 0 0 4px; text-transform: uppercase; letter-spacing: .06em; }
.shopping-row { grid-template-columns: auto minmax(115px,1fr) minmax(70px,.55fr) minmax(70px,.55fr); }
.shopping-row.done .item-name { text-decoration: line-through; color: var(--muted); }
.check { width: 22px; height: 22px; accent-color: var(--primary); }
.budget-bar { height: 10px; border-radius: 999px; background: var(--surface-2); overflow: hidden; margin-top: 10px; }
.budget-bar > span { height: 100%; display: block; background: var(--green); border-radius: inherit; transition: width .2s ease; }
.budget-bar.over > span { background: var(--red); }

.form-grid { display: grid; gap: 12px; }
.form-grid.two { grid-template-columns: 1fr 1fr; }
label.field { display: grid; gap: 6px; font-size: 13px; font-weight: 700; color: var(--muted); }
.field input, .field select, .field textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 11px;
  background: white;
  color: var(--text);
}
.field textarea { min-height: 88px; resize: vertical; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; }
.switch { position: relative; width: 48px; height: 28px; }
.switch input { opacity: 0; width: 0; height: 0; }
.switch span { position: absolute; inset: 0; border-radius: 999px; background: #cbc6d7; transition: .2s; cursor: pointer; }
.switch span::after { content: ""; position: absolute; width: 22px; height: 22px; left: 3px; top: 3px; border-radius: 50%; background: white; transition: .2s; box-shadow: 0 2px 7px rgba(0,0,0,.15); }
.switch input:checked + span { background: var(--primary); }
.switch input:checked + span::after { transform: translateX(20px); }

.notice { padding: 12px; border-radius: 14px; background: var(--amber-soft); color: #7a561c; font-size: 13px; }
.notice.primary { background: var(--primary-soft); color: #4b3bb0; }
.notice.green { background: var(--green-soft); color: #28765a; }

.chart-wrap { width: 100%; overflow: hidden; }
canvas { width: 100%; max-height: 220px; }

.modal {
  border: 0;
  padding: 0;
  width: min(calc(100% - 24px), 620px);
  max-height: 90dvh;
  border-radius: 24px;
  box-shadow: 0 30px 90px rgba(33,29,46,.30);
}
.modal::backdrop { background: rgba(30,25,43,.48); backdrop-filter: blur(4px); }
.modal-card { padding: 0; }
.modal-header { position: sticky; top: 0; z-index: 2; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 18px 18px 12px; background: white; border-bottom: 1px solid var(--line); }
.modal-header h2 { margin: 2px 0 0; font-size: 22px; }
.modal-body { padding: 16px 18px; max-height: 66dvh; overflow: auto; }
.modal-actions { position: sticky; bottom: 0; display: flex; justify-content: flex-end; gap: 8px; padding: 12px 18px calc(12px + env(safe-area-inset-bottom)); background: white; border-top: 1px solid var(--line); }

@media (min-width: 700px) {
  .main-content { padding-inline: 24px; }
  .day-grid { grid-template-columns: repeat(2, 1fr); }
  .day-card:first-child { grid-column: span 2; }
  .meal-week-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .meal-day { margin-bottom: 0; }
}

@media (max-width: 520px) {
  .exercise-row { grid-template-columns: 1fr 70px 58px 58px auto; font-size: 12px; }
  .shopping-row { grid-template-columns: auto 1fr 70px; }
  .shopping-row .price-input { grid-column: 3; }
  .form-grid.two { grid-template-columns: 1fr; }
}

/* Forma v2 */
.day-card.unavailable { background: linear-gradient(180deg, #fff, #fff8f0); border-color: #efd9ba; }
.unavailable-event { background: var(--amber-soft); color: #7a561c; }
.workout-list { display: grid; gap: 12px; }
.workout-card h2 { margin: 3px 0 4px; font-size: 19px; }
.mini-progress { height: 8px; border-radius: 999px; background: var(--surface-2); overflow: hidden; margin: 12px 0; }
.mini-progress span { display: block; height: 100%; border-radius: inherit; background: var(--primary); }
.routine-summary { margin-top: 10px; }
.routine-summary summary { cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.routine-summary summary::-webkit-details-marker { display: none; }
.routine-summary summary > span { color: var(--primary); font-weight: 750; font-size: 13px; }
.routine-list { margin-top: 14px; }
.routine-line, .class-line { display: grid; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid var(--line); }
.routine-line { grid-template-columns: 1fr auto; }
.routine-line small { display: block; color: var(--muted); margin-top: 2px; }
.class-line { grid-template-columns: 55px 1fr auto; }
.workout-exercises { display: grid; gap: 12px; margin: 16px 0; }
.workout-exercise { border: 1px solid var(--line); border-radius: 16px; padding: 13px; background: var(--bg); }
.exercise-title { display: flex; align-items: flex-start; gap: 10px; }
.exercise-title strong { display: block; }
.exercise-title small { display: block; color: var(--muted); margin-top: 3px; }
.exercise-check { padding-top: 1px; }
.exercise-help { margin: 10px 0; border-radius: 12px; background: white; padding: 9px 11px; }
.exercise-help summary { cursor: pointer; color: var(--primary); font-size: 13px; font-weight: 750; }
.exercise-help p { margin: 8px 0 1px; color: var(--muted); font-size: 13px; line-height: 1.45; }

.exercise-topline { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
.exercise-topline .exercise-title { min-width:0; flex:1; }
.exercise-swap-button { flex:0 0 auto; border:1px solid var(--line); background:white; color:var(--primary); border-radius:10px; padding:8px 10px; font-size:12px; font-weight:800; cursor:pointer; }
.exercise-swap-button:active { transform:translateY(1px); }
.alternative-banner { display:flex; align-items:flex-start; gap:8px; margin:9px 0; padding:9px 10px; border-radius:12px; background:var(--amber-soft); color:var(--amber); font-size:12px; line-height:1.4; }
.alternative-banner strong { color:var(--text); }
.alternative-picker { margin:10px 0 12px; padding:10px; border:1px solid var(--line); border-radius:14px; background:white; }
.alternative-picker[hidden] { display:none; }
.alternative-picker > p { margin:0 0 8px; color:var(--muted); font-size:12px; }
.alternative-options { display:grid; gap:7px; }
.alternative-option { width:100%; text-align:left; border:1px solid var(--line); border-radius:12px; background:var(--bg); color:var(--text); padding:10px 11px; cursor:pointer; }
.alternative-option strong { display:block; font-size:13px; }
.alternative-option small { display:block; margin-top:3px; color:var(--muted); line-height:1.35; }
.alternative-option.selected { border-color:var(--primary); background:var(--primary-soft); }
.alternative-option.original { border-style:dashed; }
.exercise-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
.exercise-inputs label { display: grid; gap: 4px; color: var(--muted); font-size: 11px; font-weight: 700; }
.exercise-inputs input { width: 100%; min-width: 0; padding: 9px 6px; border: 1px solid var(--line); border-radius: 10px; background: white; }
.field.compact { margin-top: 9px; }
.field.compact input { padding: 9px; }
.inset-card { margin-top: 12px; padding: 13px; border: 1px solid var(--line); border-radius: 14px; background: var(--bg); }
.inset-card p:first-child, .inset-card h3:first-child { margin-top: 0; }
.meal-detail-row { padding: 10px 0; border-bottom: 1px solid var(--line); }
.meal-detail-row:last-of-type { border-bottom: 0; }
.meal-main-button { width: 100%; border: 0; background: transparent; display: grid; grid-template-columns: 70px 1fr auto; gap: 8px; text-align: left; align-items: center; padding: 0; color: var(--text); cursor: pointer; }
.meal-main-button strong, .meal-main-button small { display: block; }
.meal-main-button small { color: var(--muted); margin-top: 2px; }
.meal-slot { color: var(--muted); font-size: 12px; font-weight: 750; }
.ingredient-list { list-style: none; margin: 8px 0 0 78px; padding: 0; display: flex; flex-wrap: wrap; gap: 6px; }
.ingredient-list li { padding: 5px 8px; border-radius: 999px; background: var(--surface-2); font-size: 11px; color: var(--muted); }
.ingredient-list li strong { color: var(--text); }
@media (min-width: 700px) {
  .workout-list { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 520px) {
  .exercise-inputs { grid-template-columns: repeat(2, 1fr); }
  .ingredient-list { margin-left: 0; }
  .meal-main-button { grid-template-columns: 62px 1fr auto; }
}

  

/* v3: entrenamiento en directo, temporizador y composición corporal */
.live-summary { display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin:12px 0; }
.live-summary .metric-box { padding:10px; border-radius:14px; background:var(--surface-2); text-align:center; }
.live-summary strong { display:block; font-size:18px; }
.live-toolbar { position:sticky; top:-1px; z-index:5; margin:-2px -2px 12px; padding:10px; border-radius:16px; background:rgba(255,255,255,.96); border:1px solid var(--line); backdrop-filter:blur(12px); }
.timer-display { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.timer-clock { font-variant-numeric:tabular-nums; font-size:27px; font-weight:850; letter-spacing:.02em; }
.timer-buttons { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.timer-buttons button { flex:1; min-width:58px; }
.set-table { display:grid; gap:7px; margin-top:11px; }
.set-row { display:grid; grid-template-columns:32px minmax(64px,1fr) minmax(64px,1fr) 38px; gap:8px; align-items:end; padding:8px; border-radius:12px; background:white; border:1px solid var(--line); }
.set-row.done { background:var(--green-soft); border-color:#b9e1d2; }
.set-number { width:30px; height:30px; display:grid; place-content:center; border-radius:10px; background:var(--surface-2); font-weight:800; }
.set-row label { font-size:10px; color:var(--muted); font-weight:750; }
.set-row input { width:100%; margin-top:4px; padding:8px; border:1px solid var(--line); border-radius:9px; background:var(--surface); }
.set-check { width:30px; height:30px; accent-color:var(--green); }
.last-performance { margin-top:7px; padding:8px 10px; border-radius:11px; background:var(--primary-soft); color:#4b3eaa; font-size:12px; }
.bodypump-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin-top:12px; }
.bodypump-item { padding:11px; border-radius:14px; background:var(--surface-2); }
.bodypump-item strong { display:block; font-size:13px; }
.bodypump-item span { color:var(--primary); font-weight:850; font-size:17px; }
.history-list { display:grid; gap:8px; margin-top:10px; }
.history-item { padding:10px; border-radius:12px; background:var(--surface-2); font-size:12px; }
.composition-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-top:13px; }
.composition-card { padding:11px; border-radius:14px; background:rgba(255,255,255,.12); }
.composition-card strong { display:block; font-size:17px; }
.meal-prep { margin:6px 0 2px 34px; }
.meal-prep summary { cursor:pointer; color:var(--primary); font-size:12px; font-weight:750; }
.meal-prep p { margin:6px 0 0; font-size:12px; color:var(--muted); line-height:1.45; }
.source-note { padding:11px 12px; border-radius:13px; background:var(--amber-soft); color:#80520f; font-size:12px; line-height:1.45; }
@media (max-width:520px) {
  .live-summary, .composition-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .set-row { grid-template-columns:28px minmax(58px,1fr) minmax(58px,1fr) 34px; gap:6px; }
}


/* Forma v5 UI refresh */
:root {
  --bg: #f4f8f7;
  --surface: rgba(255,255,255,.9);
  --surface-2: #eaf4f2;
  --text: #162321;
  --muted: #5c6f6c;
  --line: #d7e6e1;
  --primary: #0f766e;
  --primary-soft: #dff5ef;
  --accent: #f97316;
  --green: #15803d;
  --green-soft: #e8f7ee;
  --amber: #b45309;
  --amber-soft: #fff3df;
  --red: #c2410c;
  --red-soft: #fff1ea;
  --shadow: 0 18px 44px rgba(15, 56, 50, .10);
  --shadow-soft: 0 10px 30px rgba(15, 56, 50, .08);
  --radius: 24px;
}
html { scroll-behavior: smooth; }
body {
  background:
    radial-gradient(circle at 0% 0%, rgba(15,118,110,.10), transparent 28%),
    radial-gradient(circle at 100% 0%, rgba(249,115,22,.08), transparent 24%),
    linear-gradient(180deg, #f7fbfa 0%, #f1f7f5 100%);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(255,255,255,.18), transparent 22%);
}
.app-shell { min-height: 100dvh; }
.topbar {
  width: min(100%, 980px);
  margin: 0 auto;
  padding-inline: 16px;
  gap: 14px;
}
.brand-row { display: flex; align-items: center; gap: 12px; min-width: 0; }
.brand-mark {
  width: 46px;
  height: 46px;
  border-radius: 16px;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, rgba(15,118,110,.18), rgba(19,163,127,.10));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.7), var(--shadow-soft);
  flex: 0 0 auto;
}
.brand-mark svg { width: 40px; height: 40px; display: block; }
.topbar h1 { font-size: clamp(28px, 4vw, 34px); }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.main-content { width: min(100%, 980px); padding-top: 10px; padding-bottom: 28px; }
.eyebrow { color: color-mix(in srgb, var(--muted) 90%, transparent); }
.bottom-nav {
  width: min(calc(100% - 18px), 780px);
  bottom: 10px;
  border: 1px solid rgba(215, 230, 225, .85);
  border-radius: 26px;
  padding: 10px 8px calc(10px + env(safe-area-inset-bottom));
  box-shadow: 0 20px 40px rgba(18, 49, 45, .10);
  background: color-mix(in srgb, rgba(255,255,255,.92) 92%, transparent);
}
.nav-item { min-height: 58px; border-radius: 18px; transition: .2s ease; }
.nav-item:hover { background: rgba(223,245,239,.9); color: var(--text); }
.nav-item.active {
  background: linear-gradient(180deg, #ffffff 0%, #e7f8f3 100%);
  color: var(--primary);
  box-shadow: inset 0 0 0 1px rgba(15,118,110,.12);
}
.nav-icon { display: grid; place-items: center; }
.nav-icon svg { width: 22px; height: 22px; }
.icon-button {
  box-shadow: 0 12px 24px rgba(15,118,110,.16);
  background: linear-gradient(180deg, #12a182 0%, #0f766e 100%);
}
.icon-button.secondary {
  background: rgba(255,255,255,.72);
  color: var(--text);
  border: 1px solid rgba(215,230,225,.95);
  box-shadow: none;
}
.card {
  background: color-mix(in srgb, var(--surface) 96%, transparent);
  border: 1px solid rgba(219,232,227,.95);
  backdrop-filter: blur(16px);
}
.card:hover { box-shadow: 0 18px 42px rgba(15,56,50,.11); }
.hero {
  background: linear-gradient(135deg, #0b5e60 0%, #0f766e 58%, #13a37f 100%);
  border: 0;
}
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, rgba(255,255,255,.06), transparent 35%);
}
.hero::after {
  width: 220px; height: 220px; right: -72px; top: -110px;
  background: radial-gradient(circle, rgba(255,255,255,.18), rgba(255,255,255,0));
}
.metric-grid { gap: 10px; }
.metric {
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.12);
  backdrop-filter: blur(8px);
}
.metric strong { font-size: 20px; }
.button { background: linear-gradient(180deg, #12a182 0%, #0f766e 100%); box-shadow: 0 10px 20px rgba(15,118,110,.15); }
.button.secondary, .chip-button { background: #edf6f4; }
.button.ghost { background: rgba(255,255,255,.72); }
.day-grid { gap: 14px; }
.day-card { padding: 16px; transition: transform .18s ease, box-shadow .18s ease; }
.day-card:hover { transform: translateY(-1px); }
.day-card.today { border-color: rgba(15,118,110,.24); box-shadow: 0 18px 34px rgba(15,118,110,.14); }
.day-head h3 { margin-bottom: 3px; font-size: 19px; text-transform: capitalize; }
.event {
  border-radius: 16px;
  border: 1px solid rgba(215,230,225,.9);
  background: rgba(250,252,252,.92);
}
.event.training.completed { border-color: rgba(21,128,61,.2); background: #f0fbf4; }
.event.training.planned { border-color: rgba(15,118,110,.12); }
.event.class { background: #f8fbfb; }
.notice.primary { background: linear-gradient(180deg, #edf8f5, #f7fbfa); border-color: rgba(15,118,110,.15); }
.modal { border-radius: 28px; border: 1px solid rgba(215,230,225,.95); }
.modal-header, .modal-actions { background: rgba(255,255,255,.96); }
input, select, textarea { border-radius: 14px; }
.exercise-card, .meal-day, .shopping-row, .progress-card { border-radius: 18px; }
.exercise-card { background: rgba(249,252,251,.94); border: 1px solid rgba(215,230,225,.9); }
.set-row { border-radius: 14px; }
.exercise-help summary { cursor: pointer; }
.shopping-row { background: rgba(251,253,252,.92); }
input:focus-visible, button:focus-visible, select:focus-visible, textarea:focus-visible, summary:focus-visible {
  outline: 3px solid rgba(15,118,110,.20);
  outline-offset: 2px;
}
.empty-state { border-radius: 16px; background: #f7fbfa; }
@media (min-width: 740px) {
  .day-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .metric-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
}
@media (min-width: 1080px) {
  .app-shell { padding-left: 112px; padding-bottom: 22px; }
  .topbar, .main-content { width: min(100%, 1060px); }
  .topbar { padding-inline: 8px 12px; }
  .bottom-nav {
    left: 20px;
    transform: none;
    bottom: 20px;
    top: 20px;
    width: 84px;
    grid-template-columns: 1fr;
    grid-auto-rows: min-content;
    align-content: start;
    border-radius: 30px;
    padding: 16px 10px;
  }
  .nav-item { min-height: 72px; padding: 8px 0; }
  .nav-item small { font-size: 11px; }
  .main-content { padding-top: 14px; }
  .day-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .day-card:first-child { grid-column: span 1 !important; }
  .meal-week-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
}
@media (prefers-reduced-motion: reduce) {
  * { scroll-behavior: auto !important; transition: none !important; animation: none !important; }
}
html[data-theme="dark"] {
  --bg: #0d1514;
  --surface: rgba(18,28,27,.9);
  --surface-2: #14201f;
  --text: #ebf4f2;
  --muted: #9db1ad;
  --line: #213230;
  --primary: #34d399;
  --primary-soft: #14362c;
  --accent: #fb923c;
  --green: #4ade80;
  --green-soft: #0e2317;
  --amber: #f59e0b;
  --amber-soft: #2e2410;
  --red: #f97316;
  --red-soft: #31180e;
  --shadow: 0 18px 44px rgba(0,0,0,.28);
  --shadow-soft: 0 10px 30px rgba(0,0,0,.22);
}
html[data-theme="dark"] body {
  background:
    radial-gradient(circle at 0% 0%, rgba(52,211,153,.12), transparent 28%),
    radial-gradient(circle at 100% 0%, rgba(251,146,60,.08), transparent 24%),
    linear-gradient(180deg, #0d1514 0%, #111b1a 100%);
}
html[data-theme="dark"] .topbar,
html[data-theme="dark"] .modal-header,
html[data-theme="dark"] .modal-actions {
  background: color-mix(in srgb, #0f1716 88%, transparent);
}
html[data-theme="dark"] .bottom-nav {
  background: color-mix(in srgb, #101918 92%, transparent);
  border-color: rgba(33,50,48,.95);
}
html[data-theme="dark"] .nav-item.active {
  background: linear-gradient(180deg, #132422 0%, #18312c 100%);
}
html[data-theme="dark"] .button.secondary,
html[data-theme="dark"] .chip-button,
html[data-theme="dark"] .button.ghost,
html[data-theme="dark"] .icon-button.secondary,
html[data-theme="dark"] .shopping-row,
html[data-theme="dark"] .event,
html[data-theme="dark"] .empty-state,
html[data-theme="dark"] .exercise-card,
html[data-theme="dark"] .notice.primary {
  background: #12201f;
  color: var(--text);
  border-color: #203230;
}
html[data-theme="dark"] .card,
html[data-theme="dark"] .modal {
  background: rgba(18,28,27,.92);
  border-color: rgba(32,50,48,.95);
}
html[data-theme="dark"] input,
html[data-theme="dark"] select,
html[data-theme="dark"] textarea {
  background: #0f1716;
  color: var(--text);
  border-color: #253937;
}


/* Forma v6: patrones inspirados en apps de entrenamiento, planificación y compra */
.brand-home { border: 0; background: transparent; padding: 0; color: inherit; text-align: left; cursor: pointer; }
.nav-icon-badged { position: relative; }
.nav-icon-badged em { position: absolute; right: -10px; top: -8px; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; display: grid; place-items: center; background: var(--accent); color: white; font-size: 10px; font-style: normal; font-weight: 850; box-shadow: 0 3px 8px rgba(249,115,22,.28); }
.today-grid { display: grid; gap: 14px; }
.today-card { min-width: 0; }
.today-card h2 { margin-bottom: 6px; }
.today-actions { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; }
.quick-action { border: 1px solid var(--line); background: var(--surface); color: var(--text); border-radius: 18px; padding: 14px; text-align: left; cursor: pointer; min-height: 84px; }
.quick-action strong, .quick-action small { display: block; }
.quick-action small { color: var(--muted); margin-top: 4px; }
.readiness-grid { display: grid; gap: 12px; }
.readiness-row { display: grid; grid-template-columns: 95px 1fr; gap: 10px; align-items: center; }
.readiness-row strong { font-size: 13px; }
.scale-chips, .filter-chips { display: flex; gap: 7px; flex-wrap: wrap; }
.scale-chip, .filter-chip { border: 1px solid var(--line); background: var(--surface-2); color: var(--muted); min-width: 38px; min-height: 38px; border-radius: 12px; font-weight: 800; cursor: pointer; }
.scale-chip.active, .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
.readiness-message { margin-top: 12px; padding: 11px 12px; border-radius: 14px; background: var(--primary-soft); color: var(--text); font-size: 13px; }
.today-meal { display: grid; grid-template-columns: 68px 1fr auto; align-items: center; gap: 9px; padding: 11px 0; border-bottom: 1px solid var(--line); }
.today-meal:last-child { border-bottom: 0; }
.today-meal span:first-child { color: var(--muted); font-size: 12px; font-weight: 800; }
.today-meal strong, .today-meal small { display: block; }
.today-meal small { color: var(--muted); margin-top: 2px; }
.meal-row-main { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px; }
.cook-button { border: 1px solid var(--line); background: var(--surface-2); color: var(--primary); border-radius: 12px; padding: 8px 10px; font-weight: 800; cursor: pointer; }
.portion-pill { display: inline-flex; margin-left: 6px; padding: 2px 7px; border-radius: 999px; background: var(--primary-soft); color: var(--primary); font-size: 10px; font-weight: 850; vertical-align: middle; }
.cooking-ingredients { display: grid; gap: 8px; margin: 12px 0 18px; }
.cooking-ingredient { display: flex; gap: 10px; align-items: center; padding: 11px 12px; border-radius: 14px; background: var(--surface-2); }
.cooking-ingredient input { width: 20px; height: 20px; }
.cooking-step { display: grid; grid-template-columns: 30px 1fr; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--line); }
.cooking-step span { width: 28px; height: 28px; border-radius: 10px; display: grid; place-items: center; background: var(--primary); color: white; font-weight: 900; }
.load-guidance { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 7px; }
.guidance-pill { padding: 6px 9px; border-radius: 999px; background: var(--primary-soft); color: var(--primary); font-size: 11px; font-weight: 800; }
.guidance-pill.best { background: var(--amber-soft); color: var(--amber); }
.shopping-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.shopping-empty-filter { padding: 24px 10px; text-align: center; color: var(--muted); }
@media (min-width: 760px) {
  .today-grid { grid-template-columns: 1.25fr .75fr; }
  .today-card.wide { grid-column: 1 / -1; }
  .readiness-grid { grid-template-columns: repeat(3,1fr); }
  .readiness-row { grid-template-columns: 1fr; }
}
@media (max-width: 420px) {
  .today-actions { grid-template-columns: 1fr; }
  .readiness-row { grid-template-columns: 82px 1fr; }
  .meal-row-main { grid-template-columns: 1fr; }
  .cook-button { width: 100%; }
}

  const SLOT_LABELS = { breakfast: 'Desayuno', lunch: 'Comida', snack: 'Extra', dinner: 'Cena' };

  const $ = (selector, root = document) => root.querySelector(selector);
  const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];
  const uid = () => `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
  const clone = value => JSON.parse(JSON.stringify(value));

  function escapeHtml(value = '') {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function parseDate(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d, 12, 0, 0, 0);
  }

  function isoDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function addDays(isoOrDate, days) {
    const date = typeof isoOrDate === 'string' ? parseDate(isoOrDate) : new Date(isoOrDate);
    date.setDate(date.getDate() + days);
    return isoDate(date);
  }

  function startOfWeek(date = new Date()) {
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 12);
    d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    return isoDate(d);
  }

  function dayIndexFromIso(iso) {
    return (parseDate(iso).getDay() + 6) % 7;
  }

  function formatDate(iso, options = { day: 'numeric', month: 'short' }) {
    return parseDate(iso).toLocaleDateString('es-ES', options);
  }

  function formatWeekRange(monday) {
    const sunday = addDays(monday, 6);
    const a = parseDate(monday);
    const b = parseDate(sunday);
    if (a.getMonth() === b.getMonth()) return `${a.getDate()}–${b.getDate()} de ${MONTHS[a.getMonth()]}`;

    const [h, m] = String(time || '00:00').split(':').map(Number);

  function migrateSaved(saved) {
    const fresh = seedState();
    if (!saved) return fresh;
    const migrated = {
      ...fresh,
      ...saved,
      version: 6,
      profile: { ...fresh.profile, ...(saved.profile || {}) },
      settings: { ...fresh.settings, ...(saved.settings || {}) },
      ui: { ...fresh.ui, ...(saved.ui || {}) },
      routines: saved.routines || clone(defaultRoutines),
      bodyPump: { ...fresh.bodyPump, ...(saved.bodyPump || {}), current: { ...fresh.bodyPump.current, ...(saved.bodyPump?.current || {}) }, history: saved.bodyPump?.history || [] },
      dailyCheckins: saved.dailyCheckins || {}
    };
    const customMeals = (saved.mealLibrary || []).filter(meal => !mealLibrarySeed.some(seed => seed.id === meal.id) && !['chicken-rice','lentils-rice-eggs','chickpea-tuna','tuna-pasta','soy-pasta','chicken-potato','omelette','chickpea-curry'].includes(meal.id));
    migrated.mealLibrary = [...clone(mealLibrarySeed), ...customMeals];
    const idMap = {
      'chicken-rice':'variation-chicken-rice', 'lentils-rice-eggs':'pdf-lentil-egg', 'chickpea-tuna':'pdf-chickpea-tuna',
      'tuna-pasta':'variation-tuna-pasta', 'soy-pasta':'variation-soy-bolognese', 'chicken-potato':'pdf-chicken-veg-potato',
      'omelette':'pdf-omelette-tomato-carrot', 'chickpea-curry':'pdf-chickpea-tuna'
    };
    Object.values(migrated.weeks || {}).forEach(week => {
      week.unavailableDates = week.unavailableDates || (week.socialDates || []).map(date => ({ date, lunchOutside:false, dinnerOutside:false, reason:'' }));
      delete week.socialDates;
      Object.values(week.meals || {}).forEach(plan => Object.keys(plan || {}).forEach(slot => { if (idMap[plan[slot]]) plan[slot] = idMap[plan[slot]]; }));
      (week.sessions || []).forEach(session => {
        session.workoutLog ||= {};
        session.exerciseOverrides ||= {};
        if (session.type === 'bodypump') session.workoutLog = {};
      });
    });
    migrated.progress = (migrated.progress || []).map(item => ({ source:item.source || 'manual', muscleMass:item.muscleMass || '', bodyWater:item.bodyWater || '', visceralFat:item.visceralFat || '', bmr:item.bmr || '', ...item }));
    return migrated;
  }

  function loadState() {
    try {
      const current = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (current) return migrateSaved(current);
      const previous = JSON.parse(localStorage.getItem(PREVIOUS_STORAGE_KEY));
      if (previous) return migrateSaved(previous);
      const older = JSON.parse(localStorage.getItem(OLDER_STORAGE_KEY));
      if (older) return migrateSaved(older);
      const legacy = JSON.parse(localStorage.getItem(LEGACY_KEY));
      return migrateSaved(legacy);
    } catch (error) {
      console.warn('No se pudo cargar la app', error);
      return seedState();
    }
  }

    if (pref === 'system') return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

  function applyTheme() {
    document.documentElement.dataset.theme = resolvedThemePreference();
    const btn = $('#themeToggle');
    if (!btn) return;
    const pref = state?.settings?.theme || 'light';
    const map = {
      light: { icon: '☼', label: 'Tema claro' },

  function cycleTheme() {
    const options = ['light', 'dark', 'system'];
    const current = state.settings.theme || 'light';
    const next = options[(options.indexOf(current) + 1) % options.length];
    state.settings.theme = next;
    saveState();

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

  function mealById(id) {
    return state.mealLibrary.find(meal => meal.id === id) || null;
  }

  function mealTemplateForWeek(monday) {
    const anchor = new Date(2026, 0, 5, 12);
    const diff = Math.floor((parseDate(monday) - anchor) / 604800000);
    return defaultMealTemplates[((diff % defaultMealTemplates.length) + defaultMealTemplates.length) % defaultMealTemplates.length];
  }

  function createDefaultWeek(monday) {
    const template = mealTemplateForWeek(monday);
    const meals = {};
    const mealScales = {};
    for (let day = 0; day < 7; day += 1) {
      const date = addDays(monday, day);
      meals[date] = { breakfast: 'breakfast-fixed', lunch: template[day].lunch, snack: template[day].snack, dinner: template[day].dinner };
      mealScales[date] = { breakfast: 1, lunch: 1, snack: 1, dinner: 1 };
    }
    return {
      sessions: [
        { id: uid(), date: addDays(monday, 0), name: 'BodyPump', type: 'bodypump', routineKey: null, start: '18:00', duration: 60, status: 'planned', optional: false, notes: '', workoutLog: {}, exerciseOverrides: {} },
        { id: uid(), date: addDays(monday, 2), name: 'Fuerza A', type: 'strength', routineKey: 'A', start: '19:00', duration: 60, status: 'planned', optional: false, notes: '', workoutLog: {}, exerciseOverrides: {} },
        { id: uid(), date: addDays(monday, 4), name: 'BodyPump', type: 'bodypump', routineKey: null, start: '19:00', duration: 60, status: 'planned', optional: false, notes: '', workoutLog: {}, exerciseOverrides: {} },
        { id: uid(), date: addDays(monday, 6), name: 'Fuerza B', type: 'strength', routineKey: 'B', start: '11:00', duration: 50, status: 'planned', optional: true, notes: '', workoutLog: {}, exerciseOverrides: {} }
      ],
      unavailableDates: [],
      meals,
      mealScales,
      shoppingStatus: {},
      customShopping: []
    };
  }

  function normalizeWeek(week) {
    week.sessions ||= [];
    week.unavailableDates ||= [];
    week.meals ||= {};
    week.mealScales ||= {};
    Object.keys(week.meals).forEach(date => { week.mealScales[date] ||= { breakfast:1, lunch:1, snack:1, dinner:1 }; });
    week.shoppingStatus ||= {};
    week.customShopping ||= [];
    week.sessions.forEach(session => {
      session.workoutLog ||= {};
      session.exerciseOverrides ||= {};
      if (session.type === 'strength-b') { session.type = 'strength'; session.routineKey = 'B'; }
      if (session.type === 'strength' && !session.routineKey) session.routineKey = session.name.toLowerCase().includes('b') ? 'B' : 'A';
    });
    return week;
  }

  function getWeek(monday = state.ui.selectedWeek) {
    const template = mealTemplateForWeek(monday);
    if (!state.weeks[monday]) state.weeks[monday] = createDefaultWeek(monday);
    normalizeWeek(state.weeks[monday]);
    for (let day = 0; day < 7; day += 1) {
      const date = addDays(monday, day);
      state.weeks[monday].meals[date] ||= { breakfast: 'breakfast-fixed', lunch: template[day].lunch, snack: template[day].snack, dinner: template[day].dinner };
      state.weeks[monday].mealScales[date] ||= { breakfast:1, lunch:1, snack:1, dinner:1 };
    }
    saveState();
    return state.weeks[monday];
  }

  function unavailableEntry(week, date) {
    return week.unavailableDates.find(item => item.date === date) || null;

  function sessionExercises(session) {
    if (session.type === 'bodypump') return [];
    const baseExercises = state.routines[session.routineKey || 'A']?.exercises || [];
    session.exerciseOverrides ||= {};
    return baseExercises.map(base => {
      const replacement = session.exerciseOverrides[base.id];
      if (!replacement) return { ...base, baseId: base.id, originalName: base.name, isAlternative: false };
      return { ...base, ...replacement, baseId: base.id, originalName: base.name, isAlternative: true };
    });
  }

  function nextWorkout() {
    const now = new Date();
    const today = isoDate(now);
    const nowClock = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    const currentMonday = startOfWeek(now);
    const selectedMonday = state.ui.selectedWeek;
    const selected = getWeek(selectedMonday).sessions.filter(s => s.status === 'planned');
    if (selectedMonday !== currentMonday) return selected.sort((a, b) => `${a.date}T${a.start}`.localeCompare(`${b.date}T${b.start}`))[0] || null;
    const future = selected.filter(s => s.date > today || (s.date === today && s.start >= nowClock)).sort((a, b) => `${a.date}T${a.start}`.localeCompare(`${b.date}T${b.start}`));
    if (future[0]) return future[0];
    return getWeek(addDays(currentMonday, 7)).sessions.filter(s => s.status === 'planned').sort((a, b) => `${a.date}T${a.start}`.localeCompare(`${b.date}T${b.start}`))[0] || null;
  }


  function mealScaleFor(week, date, slot) {
    return Number(week?.mealScales?.[date]?.[slot] || 1);
  }

  function scaledMealNumbers(meal, scale = 1) {
    return { kcal: Math.round(Number(meal?.kcal || 0) * scale), protein: Math.round(Number(meal?.protein || 0) * scale) };
  }

  function dailyMealTotals(week, date) {
    const plan = week.meals?.[date] || {};
    return Object.entries(plan).reduce((acc, [slot, mealId]) => {
      const meal = mealById(mealId);
      const scale = mealScaleFor(week, date, slot);
      const numbers = scaledMealNumbers(meal, scale);
      acc.kcal += numbers.kcal; acc.protein += numbers.protein;
      return acc;
    }, { kcal: 0, protein: 0 });
  }

  function currentCheckin(date = isoDate(new Date())) {
    state.dailyCheckins ||= {};
    state.dailyCheckins[date] ||= { energy: 3, sleep: 3, soreness: 2, steps: '' };
    return state.dailyCheckins[date];
  }

  function readinessAdvice(checkin) {
    const energy = Number(checkin.energy || 3), sleep = Number(checkin.sleep || 3), soreness = Number(checkin.soreness || 2);
    if (sleep <= 2 || energy <= 2 || soreness >= 4) return 'Hoy prioriza técnica. Mantén los pesos o reduce una serie si notas fatiga.';
    if (sleep >= 4 && energy >= 4 && soreness <= 2) return 'Buena disposición: sigue el plan y aplica la subida sugerida solo si la técnica es sólida.';
    return 'Disposición normal: completa el entrenamiento previsto sin necesidad de forzar el fallo.';
  }

  function allExerciseLogs(exerciseId, beforeDate = '9999-12-31', excludeSessionId = null) {
    const logs = [];
    Object.values(state.weeks).forEach(week => (week.sessions || []).forEach(session => {
      if (session.id === excludeSessionId || session.date > beforeDate || session.type === 'bodypump') return;
      const log = session.workoutLog?.[exerciseId];
      if (log) logs.push({ ...log, date: session.date, sessionName: session.name });
    }));
    return logs.sort((a,b) => b.date.localeCompare(a.date));
  }

  function bestExerciseSet(exerciseId, beforeDate = '9999-12-31', excludeSessionId = null) {
    const sets = allExerciseLogs(exerciseId, beforeDate, excludeSessionId).flatMap(log => (log.setsData || []).filter(set => set.done && set.weight !== '' && set.reps !== '').map(set => ({...set, date:log.date})));
    return sets.sort((a,b) => Number(b.weight)-Number(a.weight) || Number(b.reps)-Number(a.reps))[0] || null;
  }

  function loadSuggestion(exercise, last) {
    if (!last) return { text: 'Primera sesión: empieza conservador y deja 2–3 repeticiones en reserva.', next: null };
    const sets = (last.setsData || []).filter(set => set.done && set.weight !== '' && set.reps !== '');
    if (!sets.length) return { text: 'Repite una carga cómoda y registra todas las series.', next: null };
    const nums = String(exercise.reps || '').match(/\d+/g)?.map(Number) || [8,12];
    const low = nums[0], high = nums[nums.length-1];
    const base = Math.max(...sets.map(set => Number(set.weight || 0)));
    const rir = Number(last.rir ?? 2);
    const allHigh = sets.every(set => Number(set.reps) >= high);
    const belowLow = sets.some(set => Number(set.reps) < low);
    if (allHigh && rir >= 2) {
      const increment = base < 20 ? 1 : 2.5;
      return { text: `Puedes probar ${Number((base + increment).toFixed(2))} kg en la primera serie.`, next: base + increment };
    }
    if (belowLow && rir <= 1) return { text: `Mantén ${base} kg o reduce ligeramente hasta completar el rango con buena técnica.`, next: base };
    return { text: `Repite alrededor de ${base} kg e intenta mejorar una repetición.`, next: base };
  }

  function pendingShoppingCount(week = getWeek()) {
    const generated = generatedShoppingItems(week).filter(item => { const s = shoppingStatusFor(item, week); return !s.have && !s.bought; }).length;
    const custom = (week.customShopping || []).filter(item => !item.have && !item.bought).length;
    return generated + custom;
  }

    if (session.type === 'bodypump') return { done: session.status === 'completed' ? 1 : 0, total: 1 };

    const done = exercises.filter(ex => (session.workoutLog?.[ex.id]?.setsData || []).length && (session.workoutLog?.[ex.id]?.setsData || []).every(set => set.done)).length;
    return { done, total: exercises.length };
  }

  function isAllowedCandidate(day, start) {
    if (day >= 5) return true;
    return timeToMinutes(start) >= timeToMinutes(state.settings.weekdayEarliest || '15:30');
  }

  function scheduleConflict(week, date, start, end, ignoreSessionId = null) {
    const day = dayIndexFromIso(date);
    const startMin = timeToMinutes(start);
    const endMin = timeToMinutes(end);
    const uni = state.university.find(item => item.day === day);
    if (uni && startMin < timeToMinutes(uni.end) && endMin > timeToMinutes(uni.start)) return true;
    return week.sessions.some(s => s.id !== ignoreSessionId && s.date === date && s.status !== 'skipped' && startMin < timeToMinutes(s.start) + Number(s.duration || 60) && endMin > timeToMinutes(s.start));
  }

  function candidateList(session, monday) {
    let candidates = [];
    if (session.type === 'bodypump') {
      candidates = state.gymClasses.filter(c => c.name.toLowerCase().includes('bodypump'));
    } else if ((session.routineKey || 'A') === 'A') {
      candidates = [
        ...state.gymClasses.filter(c => c.name.toLowerCase().includes('strength')),
        { day: 0, name: 'Fuerza A', start: '19:30', end: '20:30' },
        { day: 1, name: 'Fuerza A', start: '18:00', end: '19:00' },
        { day: 2, name: 'Fuerza A', start: '18:30', end: '19:30' },
        { day: 3, name: 'Fuerza A', start: '17:30', end: '18:30' },
        { day: 4, name: 'Fuerza A', start: '17:00', end: '18:00' },
        { day: 5, name: 'Fuerza A', start: '12:00', end: '13:00' },
        { day: 6, name: 'Fuerza A', start: '11:00', end: '12:00' }
      ];
    } else {
      candidates = [
        { day: 1, name: 'Fuerza B', start: '18:00', end: '18:50' },
        { day: 3, name: 'Fuerza B', start: '17:30', end: '18:20' },
        { day: 5, name: 'Fuerza B', start: '12:00', end: '12:50' },
        { day: 6, name: 'Fuerza B', start: '11:00', end: '11:50' }
      ];
    }
    return candidates.map(c => ({ ...c, date: addDays(monday, c.day) })).filter(c => isAllowedCandidate(c.day, c.start));
  }

  function adaptMealsAfterMove(week, oldDate, newDate) {
    const oldPlan = week.meals[oldDate];
    const newPlan = week.meals[newDate];
    if (!oldPlan || !newPlan) return;
    const oldStillTrains = week.sessions.some(s => s.date === oldDate && s.status === 'planned');
    if (!newPlan.snack) newPlan.snack = oldPlan.snack || 'milk-banana';
    if (!oldStillTrains && unavailableEntry(week, oldDate) && ['milk-banana', 'yogurt-fruit', 'snack-alpro-berries'].includes(oldPlan.snack)) oldPlan.snack = null;
  }

  function reorganizeWeek(silent = false) {
    const monday = state.ui.selectedWeek;
    const week = getWeek(monday);
    const blockedDates = new Set(week.unavailableDates.map(item => item.date));
    const sessionsToMove = week.sessions.filter(s => s.status === 'planned' && blockedDates.has(s.date));
    const moved = [];
    const blocked = [];

    sessionsToMove.forEach(session => {
      const originalDay = dayIndexFromIso(session.date);
      const candidates = candidateList(session, monday)
        .filter(c => !blockedDates.has(c.date))
        .filter(c => !scheduleConflict(week, c.date, c.start, c.end, session.id))
        .sort((a, b) => Math.abs(a.day - originalDay) - Math.abs(b.day - originalDay) || a.start.localeCompare(b.start));
      const candidate = candidates[0];
      if (!candidate) {
        blocked.push(session.name);
        return;
      }
      const oldDate = session.date;
      session.date = candidate.date;
      session.start = candidate.start;
      session.duration = durationBetween(candidate.start, candidate.end);
      if (session.type === 'bodypump') session.name = 'BodyPump';
      adaptMealsAfterMove(week, oldDate, session.date);
      moved.push(`${formatDate(oldDate)} → ${formatDate(session.date)} ${session.start}`);
    });

    week.unavailableDates.forEach(item => {
      const plan = week.meals[item.date];
      if (!plan) return;
      if (item.lunchOutside) plan.lunch = 'social-meal';
      if (item.dinnerOutside) plan.dinner = 'social-meal';
      if (!week.sessions.some(s => s.date === item.date && s.status === 'planned') && ['milk-banana', 'yogurt-fruit', 'snack-alpro-berries'].includes(plan.snack)) plan.snack = null;
    });

    saveState();
    render();
    if (!silent) {
      const message = moved.length ? `Sesiones recolocadas:\n• ${moved.join('\n• ')}` : 'No había entrenamientos que mover.';
      alert(`${message}${blocked.length ? `\n\nNo he encontrado hueco automático para: ${blocked.join(', ')}. Puedes editar esa sesión manualmente.` : ''}`);
    } else if (blocked.length) {
      alert(`El día se ha bloqueado, pero no he encontrado hueco automático para: ${blocked.join(', ')}. Puedes editar la sesión manualmente.`);
    }
  }

  function normalizeSetLog(log, exercise, last) {
    const targetSets = Number(exercise.sets || 3);
    let setsData = Array.isArray(log?.setsData) ? clone(log.setsData) : [];
    if (!setsData.length && log && (log.weight !== '' || log.reps || log.done)) {
      const count = Number(log.sets || targetSets);
      setsData = Array.from({length:count}, () => ({ weight:log.weight ?? '', reps:log.reps || '', done:!!log.done }));
    }
    const lastWeight = last?.setsData?.find(set => set.weight !== '' && set.weight != null)?.weight ?? last?.weight ?? '';
    const repHint = String(exercise.reps || '').match(/\d+/)?.[0] || '';
    while (setsData.length < targetSets) setsData.push({ weight:lastWeight, reps:repHint, done:false });
    return setsData.slice(0, targetSets).map(set => ({ weight:set.weight ?? lastWeight, reps:set.reps ?? repHint, done:!!set.done }));
  }

  function lastExercisePerformance(exerciseId, beforeDate = '9999-12-31', excludeSessionId = null) {
    const entries = [];
    Object.values(state.weeks).forEach(week => (week.sessions || []).forEach(session => {
      if (session.id === excludeSessionId || session.date > beforeDate || session.type === 'bodypump') return;
      const log = session.workoutLog?.[exerciseId];
      if (log && ((log.setsData || []).some(set => set.done || set.weight !== '') || log.weight !== '' || log.done)) entries.push({ ...log, date: session.date, sessionName: session.name });
    }));
    return entries.sort((a, b) => b.date.localeCompare(a.date))[0] || null;
  }

  let liveTimerInterval = null;
  function clearLiveTimer() { if (liveTimerInterval) clearInterval(liveTimerInterval); liveTimerInterval = null; }
  function clockText(seconds) { seconds = Math.max(0, Math.floor(seconds || 0)); return `${String(Math.floor(seconds/60)).padStart(2,'0')}:${String(seconds%60).padStart(2,'0')}`; }

  function openBodyPumpSession(session, week) {
    openModal({
      eyebrow: `${DAY_NAMES[dayIndexFromIso(session.date)]} · ${formatDate(session.date)}`,
      title: 'BodyPump',
      body: `<p class="muted">Aquí no tienes que registrar cada pista. Solo marca si has realizado la clase. Los pesos actuales se muestran como referencia.</p>${bodyPumpWeightsSummary(true)}<label class="field" style="margin-top:12px">Notas opcionales<textarea id="sessionNotes">${escapeHtml(session.notes || '')}</textarea></label>`,
      actions: '<button type="button" class="button danger" id="markBodyPumpSkipped">No realizada</button><button type="button" class="button secondary" id="editBodyPumpWeights">Cambiar pesos</button><button type="button" class="button" id="markBodyPumpDone">Marcar realizada</button>'
    });
    $('#markBodyPumpDone').onclick = () => { session.status='completed'; session.notes=$('#sessionNotes').value.trim(); saveState(); closeModal(); render(); };
    $('#markBodyPumpSkipped').onclick = () => { session.status='skipped'; session.notes=$('#sessionNotes').value.trim(); saveState(); closeModal(); render(); };
    $('#editBodyPumpWeights').onclick = () => { session.notes=$('#sessionNotes').value.trim(); saveState(); closeModal(); openBodyPumpWeightsModal(); };
  }

  function openWorkoutModal(sessionId) {
    const week = getWeek();
    const session = week.sessions.find(s => s.id === sessionId);
    if (!session) return;
    if (session.type === 'bodypump') { openBodyPumpSession(session, week); return; }
    const exercises = sessionExercises(session);
    const list = exercises.map(ex => {
      const last = lastExercisePerformance(ex.id, session.date, session.id);
      const lastSets = last?.setsData?.filter(set => set.done) || [];
      const previous = lastSets.length ? lastSets.map(set => `${set.weight || '—'} kg × ${set.reps || '—'}`).join(' / ') : (last ? `${last.weight || '—'} kg · ${last.reps || '—'}` : 'Sin registro anterior');
      const swapNote = ex.isAlternative ? `<span class="pill amber" style="margin-left:6px">Alternativa</span><small>Sustituye a ${escapeHtml(ex.originalName)}</small>` : '';
      const suggestion = loadSuggestion(ex,last);
      const best = bestExerciseSet(ex.id,session.date,session.id);
      return `<div class="routine-line"><div><strong>${escapeHtml(ex.name)}</strong>${swapNote}<small>${ex.sets} × ${escapeHtml(ex.reps)} · Último: ${escapeHtml(previous)}</small><div class="load-guidance"><span class="guidance-pill">${escapeHtml(suggestion.text)}</span>${best ? `<span class="guidance-pill best">Mejor: ${best.weight} kg × ${best.reps}</span>` : ''}</div></div></div>`;
    }).join('');
    const doneSets = Object.values(session.workoutLog || {}).flatMap(log => log.setsData || []).filter(set => set.done).length;
    openModal({
      eyebrow: `${DAY_NAMES[dayIndexFromIso(session.date)]} · ${formatDate(session.date)}`,
      title: session.name,
      body: `<div class="form-grid two"><label class="field">Fecha<input id="sessionDate" type="date" value="${session.date}"></label><label class="field">Hora<input id="sessionStart" type="time" value="${session.start}"></label></div><div class="notice primary" style="margin-top:12px">Al empezar podrás registrar cada serie, ver el último peso y activar descansos de 60, 90 o 120 segundos. Todo se guarda automáticamente.</div><div class="routine-list" style="margin-top:12px">${list}</div><label class="field" style="margin-top:12px">Notas generales<textarea id="sessionNotes">${escapeHtml(session.notes || '')}</textarea></label>`,
      actions: '<button type="button" class="button danger" id="deleteSession">Eliminar</button><button type="button" class="button secondary" id="cancelModal">Cerrar</button><button type="button" class="button" id="startWorkout">' + (session.liveStartedAt || doneSets ? 'Continuar entrenamiento' : 'Comenzar entrenamiento') + '</button>'
    });
    $('#cancelModal').onclick = closeModal;
    $('#deleteSession').onclick = () => { if (confirm('¿Eliminar este entrenamiento?')) { week.sessions = week.sessions.filter(s => s.id !== session.id); saveState(); closeModal(); render(); } };
    $('#startWorkout').onclick = () => {
      session.date = $('#sessionDate').value; session.start = $('#sessionStart').value; session.notes = $('#sessionNotes').value.trim();
      session.liveStartedAt ||= Date.now(); saveState(); closeModal(); openLiveWorkout(session.id);
    };
  }

  function updateLiveTimers(session) {
    const elapsed = $('#elapsedClock');
    const rest = $('#restClock');
    if (elapsed) elapsed.textContent = clockText((Date.now() - Number(session.liveStartedAt || Date.now())) / 1000);
    if (rest) {
      const remaining = session.restTimerEnd ? Math.max(0, Math.ceil((session.restTimerEnd - Date.now()) / 1000)) : 0;
      rest.textContent = clockText(remaining);
      if (!remaining && session.restTimerEnd) { session.restTimerEnd = null; saveState(); if (navigator.vibrate) navigator.vibrate([120,80,120]); }
    }
  }

  function startRestTimer(session, seconds) {
    session.restTimerEnd = Date.now() + Number(seconds) * 1000;
    saveState(); updateLiveTimers(session);
  }

  function openLiveWorkout(sessionId) {
    clearLiveTimer();
    const week = getWeek();
    const session = week.sessions.find(s => s.id === sessionId);
    if (!session) return;
    const exercises = sessionExercises(session);
    session.workoutLog ||= {};
    const cards = exercises.map(ex => {
      const last = lastExercisePerformance(ex.id, session.date, session.id);
      const log = session.workoutLog[ex.id] || {};
      const setsData = normalizeSetLog(log, ex, last);
      session.workoutLog[ex.id] = { ...log, setsData, notes:log.notes || '', rir:log.rir ?? 2 };
      const previous = last?.setsData?.filter(set => set.done).map(set => `${set.weight || '—'} kg × ${set.reps || '—'}`).join(' / ') || 'Sin registro anterior';
      const suggestion = loadSuggestion(ex,last);
      const best = bestExerciseSet(ex.id,session.date,session.id);
      const baseId = ex.baseId || ex.id;
      const choices = alternativesForExercise(baseId);
      const selectedId = session.exerciseOverrides?.[baseId]?.id || '';
      const options = choices.map(alt => `<button type="button" class="alternative-option ${selectedId === alt.id ? 'selected' : ''}" data-alt-select="${alt.id}" data-base="${baseId}"><strong>${escapeHtml(alt.name)} · ${alt.sets} × ${escapeHtml(alt.reps)}</strong><small>${escapeHtml(alt.note || 'Alternativa equivalente para esta sesión.')}</small></button>`).join('');
      const originalOption = ex.isAlternative ? `<button type="button" class="alternative-option original" data-alt-select="__original__" data-base="${baseId}"><strong>Volver a ${escapeHtml(ex.originalName)}</strong><small>Recupera el ejercicio previsto originalmente.</small></button>` : '';
      return `<article class="workout-exercise live-exercise" data-exercise="${ex.id}" data-base-exercise="${baseId}"><div class="exercise-topline"><div class="exercise-title"><div><strong>${escapeHtml(ex.name)}</strong><small>Objetivo: ${ex.sets} × ${escapeHtml(ex.reps)}</small></div></div><button type="button" class="exercise-swap-button" data-alt-toggle="${baseId}">${ex.isAlternative ? 'Cambiar' : 'Máquina ocupada'}</button></div>${ex.isAlternative ? `<div class="alternative-banner"><span>↔</span><div><strong>Alternativa de ${escapeHtml(ex.originalName)}</strong><br>${escapeHtml(ex.note || 'Cambio aplicado solo a este entrenamiento.')}</div></div>` : ''}<div class="alternative-picker" data-alt-panel="${baseId}" hidden><p>Elige una opción equivalente. El cambio solo afecta a esta sesión y conserva el historial de cada ejercicio por separado.</p><div class="alternative-options">${options}${originalOption}<button type="button" class="alternative-option original" data-alt-select="__manual__" data-base="${baseId}"><strong>Usar otra alternativa</strong><small>Escribe manualmente el ejercicio que vas a hacer.</small></button></div></div><div class="last-performance"><strong>Última vez:</strong> ${escapeHtml(previous)}<div class="load-guidance"><span class="guidance-pill">${escapeHtml(suggestion.text)}</span>${best ? `<span class="guidance-pill best">Mejor: ${best.weight} kg × ${best.reps}</span>` : ''}</div></div><details class="exercise-help"><summary>Ver explicación</summary><p>${escapeHtml(ex.explanation || 'Realiza el movimiento con control y sin dolor.')}</p></details><div class="set-table">${setsData.map((set,index) => `<div class="set-row ${set.done ? 'done' : ''}" data-set="${index}"><span class="set-number">${index+1}</span><label>Peso (kg)<input type="number" min="0" step="0.25" data-set-field="weight" value="${set.weight ?? ''}"></label><label>Reps<input type="number" min="0" data-set-field="reps" value="${set.reps ?? ''}"></label><input class="set-check" type="checkbox" data-set-field="done" ${set.done ? 'checked' : ''} aria-label="Serie completada"></div>`).join('')}</div><div class="form-grid two" style="margin-top:10px"><label class="field compact">RIR final<input type="number" min="0" max="5" data-ex-field="rir" value="${session.workoutLog[ex.id].rir}"></label><label class="field compact">Notas<input data-ex-field="notes" value="${escapeHtml(session.workoutLog[ex.id].notes)}" placeholder="Técnica o próxima subida"></label></div></article>`;
    }).join('');
    saveState();
    openModal({
      eyebrow: `${session.name} · ${formatDate(session.date)}`,
      title: 'Entrenamiento en directo',
      body: `<div class="live-toolbar"><div class="timer-display"><div><span class="muted tiny">ENTRENAMIENTO</span><div class="timer-clock" id="elapsedClock">00:00</div></div><div style="text-align:right"><span class="muted tiny">DESCANSO</span><div class="timer-clock" id="restClock">00:00</div></div></div><div class="timer-buttons"><button type="button" class="chip-button" data-rest="60">60 s</button><button type="button" class="chip-button" data-rest="${state.profile.restSeconds || 90}">${state.profile.restSeconds || 90} s</button><button type="button" class="chip-button" data-rest="120">120 s</button><button type="button" class="chip-button" id="stopRest">Parar</button></div></div><div class="source-note">Al marcar una serie se inicia automáticamente el descanso configurado (${state.profile.restSeconds || 90} s). Puedes cambiarlo abajo o en Progreso → Ajustes.</div><div class="workout-exercises">${cards}</div><label class="field">Notas generales<textarea id="liveSessionNotes">${escapeHtml(session.notes || '')}</textarea></label>`,
      actions: '<button type="button" class="button secondary" id="pauseWorkout">Guardar y salir</button><button type="button" class="button" id="finishWorkout">Finalizar entrenamiento</button>'
    });
    const persist = () => {
      $$('.live-exercise', $('#modalBody')).forEach(card => {
        const exId = card.dataset.exercise;
        const setsData = $$('.set-row', card).map(row => ({
          weight: $('[data-set-field="weight"]', row).value === '' ? '' : Number($('[data-set-field="weight"]', row).value),
          reps: $('[data-set-field="reps"]', row).value === '' ? '' : Number($('[data-set-field="reps"]', row).value),
          done: $('[data-set-field="done"]', row).checked
        }));
        session.workoutLog[exId] = { ...session.workoutLog[exId], setsData, rir: $('[data-ex-field="rir"]', card).value === '' ? '' : Number($('[data-ex-field="rir"]', card).value), notes:$('[data-ex-field="notes"]', card).value.trim() };
      });
      session.notes = $('#liveSessionNotes').value.trim(); saveState();
    };
    $$('.live-exercise input', $('#modalBody')).forEach(input => input.addEventListener('change', event => {
      const row = event.target.closest('.set-row');
      if (row && event.target.dataset.setField === 'done') {
        row.classList.toggle('done', event.target.checked);
        if (event.target.checked) startRestTimer(session, state.profile.restSeconds || 90);
      }
      persist();
    }));
    $$('[data-alt-toggle]', $('#modalBody')).forEach(btn => btn.onclick = () => {
      const panel = $(`[data-alt-panel="${btn.dataset.altToggle}"]`, $('#modalBody'));
      if (panel) panel.hidden = !panel.hidden;
    });
    $$('[data-alt-select]', $('#modalBody')).forEach(btn => btn.onclick = () => {
      persist();
      const baseId = btn.dataset.base;
      const selection = btn.dataset.altSelect;
      session.exerciseOverrides ||= {};
      if (selection === '__original__') {
        delete session.exerciseOverrides[baseId];
      } else if (selection === '__manual__') {
        const base = (state.routines[session.routineKey || 'A']?.exercises || []).find(item => item.id === baseId);
        const name = prompt('¿Qué ejercicio vas a hacer en su lugar?');
        if (!name || !name.trim()) return;
        const explanation = prompt('Añade una explicación breve de técnica (opcional):') || 'Alternativa manual. Realiza el movimiento con control, una carga que puedas dominar y sin dolor.';
        session.exerciseOverrides[baseId] = {
          id: `alt-manual-${baseId}-${slugifyExercise(name)}`,
          name: name.trim(),
          sets: Number(base?.sets || 3),
          reps: base?.reps || '8–12',
          note: 'Alternativa manual elegida para esta sesión.',
          explanation: explanation.trim()
        };
      } else {
        const choice = alternativesForExercise(baseId).find(item => item.id === selection);
        if (!choice) return;
        session.exerciseOverrides[baseId] = clone(choice);
      }
      saveState();
      clearLiveTimer();
      closeModal();
      openLiveWorkout(session.id);
    });
    $$('.timer-buttons [data-rest]', $('#modalBody')).forEach(btn => btn.onclick = () => startRestTimer(session, Number(btn.dataset.rest)));
    $('#stopRest').onclick = () => { session.restTimerEnd = null; saveState(); updateLiveTimers(session); };
    $('#pauseWorkout').onclick = () => { persist(); clearLiveTimer(); closeModal(); render(); };
    $('#finishWorkout').onclick = () => { persist(); session.status='completed'; session.completedAt=Date.now(); session.restTimerEnd=null; clearLiveTimer(); saveState(); closeModal(); render(); };
    liveTimerInterval = setInterval(() => updateLiveTimers(session), 1000);
    updateLiveTimers(session);
  }

  function openBodyPumpWeightsModal() {
    const inputs = bodyPumpTracks.map(track => `<label class="field">${escapeHtml(track.name)} (kg totales)<input type="number" min="0" step="0.25" data-bp-track="${track.id}" value="${state.bodyPump.current?.[track.id] ?? ''}"></label>`).join('');
    openModal({
      eyebrow:'BodyPump', title:'Actualizar pesos',
      body:`<div class="form-grid two"><label class="field">Fecha del cambio<input id="bpDate" type="date" value="${isoDate(new Date())}"></label>${inputs}</div><label class="field" style="margin-top:12px">Nota opcional<input id="bpNote" placeholder="Ej.: subo sentadillas y espalda"></label><p class="muted small">El historial se guarda solo cuando cambia algún peso.</p>`,
      actions:'<button type="button" class="button secondary" id="cancelModal">Cancelar</button><button type="button" class="button" id="saveBodyPumpWeights">Guardar cambios</button>'
    });
    $('#cancelModal').onclick = closeModal;
    $('#saveBodyPumpWeights').onclick = () => {
      const next = { ...state.bodyPump.current };
      const changes = [];
      $$('[data-bp-track]', $('#modalBody')).forEach(input => {
        const track = bodyPumpTracks.find(item => item.id === input.dataset.bpTrack);
        const value = input.value === '' ? '' : Number(input.value);
        const old = next[input.dataset.bpTrack] ?? '';
        if (String(old) !== String(value)) changes.push({ id:track.id, name:track.name, from:old, to:value });
        next[input.dataset.bpTrack] = value;
      });
      state.bodyPump.current = next;
      if (changes.length) state.bodyPump.history.push({ id:uid(), date:$('#bpDate').value, changes, note:$('#bpNote').value.trim(), snapshot:clone(next) });
      saveState(); closeModal(); render();
    };
  }

  function openSessionCreateModal() {
    openModal({ eyebrow: 'Plan semanal', title: 'Añadir entrenamiento', body: `<div class="form-grid two"><label class="field">Tipo<select id="newSessionType"><option value="bodypump">BodyPump</option><option value="A">Fuerza A</option><option value="B">Fuerza B</option></select></label><label class="field">Fecha<input id="newSessionDate" type="date" value="${state.ui.selectedWeek}"></label><label class="field">Hora<input id="newSessionStart" type="time" value="18:00"></label><label class="field">Duración<input id="newSessionDuration" type="number" value="60"></label></div><label class="toggle-row"><span>Sesión opcional</span><span class="switch"><input id="newSessionOptional" type="checkbox"><span></span></span></label>`, actions: '<button type="button" class="button secondary" id="cancelModal">Cancelar</button><button type="button" class="button" id="saveNewSession">Añadir</button>' });
    $('#cancelModal').onclick = closeModal;
    $('#saveNewSession').onclick = () => {
      const type = $('#newSessionType').value;
      const session = { id: uid(), date: $('#newSessionDate').value, start: $('#newSessionStart').value, duration: Number($('#newSessionDuration').value || 60), status: 'planned', optional: $('#newSessionOptional').checked, notes: '', workoutLog: {}, exerciseOverrides: {} };
      if (type === 'bodypump') Object.assign(session, { name: 'BodyPump', type: 'bodypump', routineKey: null });
      else Object.assign(session, { name: `Fuerza ${type}`, type: 'strength', routineKey: type });
      getWeek(startOfWeek(parseDate(session.date))).sessions.push(session);
      saveState(); closeModal(); render();
    };
  }

  function openAvailabilityModal(date) {
    const week = getWeek(startOfWeek(parseDate(date)));
    const current = unavailableEntry(week, date);
    openModal({
      eyebrow: `${DAY_NAMES[dayIndexFromIso(date)]} · ${formatDate(date)}`,
      title: current ? 'Editar día bloqueado' : 'No puedo entrenar este día',
      body: `<p class="muted">La app moverá los entrenamientos de este día a otro hueco compatible. Entre semana no usará horas anteriores a las ${state.settings.weekdayEarliest}.</p><label class="field">Motivo opcional<input id="availabilityReason" value="${escapeHtml(current?.reason || '')}" placeholder="Viaje, estudio, cansancio tras salir..."></label><div class="card inset-card"><p><strong>¿También comerás fuera?</strong></p><label class="toggle-row"><span>Comida fuera</span><span class="switch"><input id="availabilityLunch" type="checkbox" ${current?.lunchOutside ? 'checked' : ''}><span></span></span></label><label class="toggle-row"><span>Cena fuera</span><span class="switch"><input id="availabilityDinner" type="checkbox" ${current?.dinnerOutside ? 'checked' : ''}><span></span></span></label></div><p class="muted small">Si marcas una comida, se sustituirá por “comida o cena fuera”. El extra de entrenamiento se moverá al nuevo día.</p>`,
      actions: `${current ? '<button type="button" class="button danger" id="removeUnavailable">Volver a dejar disponible</button>' : ''}<button type="button" class="button secondary" id="cancelModal">Cancelar</button><button type="button" class="button" id="saveUnavailable">Guardar y reorganizar</button>`
    });
    $('#cancelModal').onclick = closeModal;
    if ($('#removeUnavailable')) $('#removeUnavailable').onclick = () => { week.unavailableDates = week.unavailableDates.filter(item => item.date !== date); saveState(); closeModal(); render(); };
    $('#saveUnavailable').onclick = () => {
      const entry = { date, reason: $('#availabilityReason').value.trim(), lunchOutside: $('#availabilityLunch').checked, dinnerOutside: $('#availabilityDinner').checked };
      week.unavailableDates = week.unavailableDates.filter(item => item.date !== date);
      week.unavailableDates.push(entry);
      state.ui.selectedWeek = startOfWeek(parseDate(date));
      saveState(); closeModal(); reorganizeWeek(true);
    };
  }

  function renderIngredientList(meal, scale = 1, includePreparation = true) {
    if (!meal?.ingredients?.length) return '<span class="muted tiny">Sin ingredientes para comprar</span>';
    const ingredients = `<ul class="ingredient-list">${meal.ingredients.map(ing => {
      const raw = Number(ing.quantity || 0) * scale;
      const quantity = Number.isInteger(raw) ? raw : Number(raw.toFixed(1));
      return `<li><strong>${quantity} ${escapeHtml(ing.unit)}</strong> ${escapeHtml(ing.name)}</li>`;
    }).join('')}</ul>`;
    return `${ingredients}${includePreparation && meal.preparation ? `<details class="meal-prep"><summary>Cómo prepararlo</summary><p>${escapeHtml(meal.preparation)}</p></details>` : ''}`;
  }


  function renderMeals() {
    const monday = state.ui.selectedWeek;
    const week = getWeek(monday);
    const days = Array.from({ length: 7 }, (_, day) => {
      const date = addDays(monday, day);
      const plan = week.meals[date];
      let kcal = 0, protein = 0;
      const rows = ['breakfast', 'lunch', 'snack', 'dinner'].map(slot => {
        const meal = mealById(plan?.[slot]);
        const scale = mealScaleFor(week,date,slot);
        const numbers = scaledMealNumbers(meal,scale);
        kcal += numbers.kcal; protein += numbers.protein;
        return `<div class="meal-detail-row"><div class="meal-row-main"><button class="meal-main-button" data-action="edit-meal" data-date="${date}" data-slot="${slot}"><span class="meal-slot">${SLOT_LABELS[slot]}</span><span><strong>${meal ? escapeHtml(meal.name) : 'Sin planificar'}${meal && scale !== 1 ? `<span class="portion-pill">×${scale}</span>` : ''}</strong><small>${meal ? `${numbers.kcal} kcal · ${numbers.protein} g proteína` : 'Toca para añadir'}</small></span><span>›</span></button>${meal ? `<button class="cook-button" data-action="cook-meal" data-date="${date}" data-slot="${slot}">Cocinar</button>` : ''}</div>${meal ? renderIngredientList(meal,scale,false) : ''}</div>`;
      }).join('');
      return `<article class="card meal-day"><div class="card-title-row"><div><h3>${DAY_NAMES[day]}</h3><p class="muted small">${formatDate(date)}</p></div><span class="pill ${protein >= state.profile.proteinTarget ? 'green' : 'amber'}">${protein} g proteína</span></div>${rows}<div class="meal-summary"><span class="pill primary">${kcal} kcal</span><span class="pill">Objetivo ${state.profile.calorieTarget}</span></div></article>`;
    }).join('');
    $('#mainContent').innerHTML = `<section class="card hero"><p class="eyebrow">Plan, compra y cocina</p><h2>Menú semanal con porciones editables</h2><p class="muted">Busca platos, cambia la ración y abre el modo cocina. La lista de la compra se recalcula automáticamente.</p></section><section class="section week-toolbar"><button class="button secondary" data-action="prev-week">‹</button><strong>${formatWeekRange(monday)}</strong><button class="button secondary" data-action="next-week">›</button></section><section class="section meal-week-grid">${days}</section><section class="section card"><div class="card-title-row"><div><h2>Mis platos</h2><p class="muted small">Añade opciones propias con sus cantidades.</p></div><button class="button" data-action="add-meal-library">Nuevo plato</button></div></section>`;
  }


  function openMealModal(date, slot) {
    const week = getWeek(startOfWeek(parseDate(date)));
    const current = week.meals[date]?.[slot] || '';
    const currentScale = mealScaleFor(week,date,slot);
    const suitable = state.mealLibrary.filter(meal => slot === 'breakfast' ? ['breakfast', 'snack'].includes(meal.type) : slot === 'snack' ? ['snack', 'social'].includes(meal.type) : meal.type !== 'breakfast');
    openModal({ eyebrow: `${DAY_NAMES[dayIndexFromIso(date)]} · ${SLOT_LABELS[slot]}`, title: 'Cambiar plato', body: `<label class="field">Buscar<input id="mealSearch" type="search" placeholder="Pollo, lentejas, merluza…"></label><div class="form-grid two" style="margin-top:10px"><label class="field">Elige una opción<select id="mealSelect"></select></label><label class="field">Porción<select id="mealScale"><option value="0.5">Media · ×0,5</option><option value="1">Normal · ×1</option><option value="1.25">Un poco más · ×1,25</option><option value="1.5">Grande · ×1,5</option><option value="2">Doble · ×2</option></select></label></div><div id="mealPreview" class="card inset-card" style="margin-top:12px"></div>`, actions: '<button type="button" class="button secondary" id="cancelModal">Cancelar</button><button type="button" class="button" id="saveMealChoice">Guardar</button>' });
    const populate = () => {
      const query = $('#mealSearch').value.trim().toLowerCase();
      const filtered = suitable.filter(meal => !query || `${meal.name} ${meal.ingredients.map(i=>i.name).join(' ')}`.toLowerCase().includes(query));
      const selected = $('#mealSelect').value || current;
      $('#mealSelect').innerHTML = `<option value="">Sin planificar</option>${filtered.map(meal => `<option value="${meal.id}" ${selected === meal.id ? 'selected' : ''}>${escapeHtml(meal.name)} · ${meal.kcal} kcal · ${meal.protein} g</option>`).join('')}`;
      updatePreview();
    };
    const updatePreview = () => {
      const meal = mealById($('#mealSelect').value);
      const scale = Number($('#mealScale').value || 1);
      const n = scaledMealNumbers(meal,scale);
